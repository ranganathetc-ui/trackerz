<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Recovery Mode Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@200;300&family=DM+Serif+Display:ital@0;1&family=Bodoni+Moda:opsz,wght@6..96,200;300&family=Playfair+Display:wght@300;400&family=EB+Garamond:wght@400&family=Libre+Baskerville:wght@400&family=Cinzel:wght@300;400&family=Josefin+Sans:wght@100;200;300&family=Outfit:wght@100;200;300&display=swap" rel="stylesheet">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  :root{--bg:#0d0d0d;--bg2:rgba(255,255,255,0.03);--bg3:rgba(255,255,255,0.06);--bg4:rgba(255,255,255,0.09);--glass:rgba(255,255,255,0.04);--glass-border:rgba(255,255,255,0.08);--text:#f0f0f0;--text2:rgba(255,255,255,0.35);--text3:rgba(255,255,255,0.2);--green:#4ade80;--yellow:#fbbf24;--red:#f87171;--radius:14px;--bg-card:#111111;--bg-cell:#141414;--bg-lift:#1a1a1a;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;}
  #app{max-width:480px;margin:0 auto;padding-bottom:100px;}
  /* SPLASH */
  #splash{position:fixed;inset:0;z-index:100;background:#0d0d0d;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:56px 36px 44px;}
  @keyframes orbit-spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
  @keyframes logo-pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
  @keyframes logo-glow{0%,100%{box-shadow:0 0 18px 4px rgba(255,255,255,0.06);}50%{box-shadow:0 0 32px 10px rgba(255,255,255,0.13);}}
  @keyframes sp-twinkle{0%,100%{opacity:0;transform:scale(0.4);}50%{opacity:1;transform:scale(1);}}
  #splash.hide{display:none!important;}
  .splash-top{display:flex;flex-direction:column;align-items:center;width:100%;}
  .splash-logo{margin-bottom:28px;}
  .splash-clock{font-size:54px;font-weight:300;letter-spacing:6px;color:var(--text);line-height:1;margin-bottom:10px;text-align:center;opacity:0.95;transition:font-family 0.3s ease,letter-spacing 0.3s ease,font-weight 0.3s ease;}
  #clock-settings-btn{color:var(--text);}
  .clock-opt-btn{border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.5);cursor:pointer;font-family:inherit;text-transform:uppercase;letter-spacing:1px;transition:all 0.2s;}
  .clock-opt-btn.active{border-color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.95);}
  #clock-settings-panel{color:rgba(255,255,255,0.9);}
  /* Landscape fullscreen clock */
  @media (orientation:landscape){
    #splash.landscape-clock-mode .splash-top{flex:1;display:flex;align-items:center;justify-content:center;}
    #splash.landscape-clock-mode .splash-clock{font-size:18vw;letter-spacing:2vw;}
    #splash.landscape-clock-mode .splash-logo,
    #splash.landscape-clock-mode .splash-day,
    #splash.landscape-clock-mode .splash-date{display:none;}
    #splash.landscape-clock-mode .splash-bottom{display:none;}
    #splash.landscape-clock-mode{justify-content:center;}
  }
  .splash-day{font-size:9px;color:var(--text3);letter-spacing:5px;text-transform:uppercase;text-align:center;margin-bottom:3px;font-weight:300;}
  .splash-date{font-size:11px;color:var(--text2);letter-spacing:2px;text-align:center;font-weight:300;}
  .splash-bottom{display:flex;flex-direction:column;align-items:center;width:100%;}
  .splash-divider{width:20px;height:1px;background:var(--glass-border);margin:0 auto 20px;}
  .splash-greeting{font-size:9px;color:var(--text3);letter-spacing:4px;text-transform:uppercase;margin-bottom:5px;text-align:center;font-weight:300;}
  .splash-name{font-size:17px;font-weight:300;color:var(--text);margin-bottom:10px;letter-spacing:2px;text-align:center;}
  .splash-quote{font-size:10px;color:var(--text3);text-align:center;line-height:2;max-width:210px;margin-bottom:20px;font-weight:300;font-style:italic;opacity:0.7;}
  .splash-stats{display:flex;gap:32px;margin-bottom:26px;align-items:center;}
  .splash-stat{font-size:8px;color:var(--text3);letter-spacing:2px;text-align:center;text-transform:uppercase;font-weight:300;}
  .splash-stat span{display:block;font-size:17px;font-weight:300;color:var(--accent);letter-spacing:0;margin-bottom:3px;}
  .splash-stat-sep{width:1px;height:22px;background:var(--glass-border);opacity:0.4;}
  .splash-btn{background:var(--text);border:none;color:#0d0d0d;padding:12px 48px;font-size:10px;font-weight:500;letter-spacing:3px;border-radius:50px;cursor:pointer;font-family:inherit;text-transform:uppercase;}
  .splash-sub{font-size:8px;color:var(--text3);margin-top:10px;letter-spacing:3px;text-transform:uppercase;font-weight:300;opacity:0.35;}
  /* HEADER */







  /* HEADER */
  #header{padding:20px 20px 14px;border-bottom:1px solid var(--glass-border);position:fixed;top:0;left:0;right:0;background:rgba(13,13,13,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:9;transition:transform 0.46s cubic-bezier(0.32,0.72,0,1),opacity 0.32s ease;}
  #header.collapsed{transform:translateY(-100%);opacity:0;pointer-events:none;}
  /* Swipe indicator pill — shows briefly when header revealed/hidden */
  #header-indicator{
    position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:12;
    width:36px;height:4px;border-radius:2px;
    background:rgba(255,255,255,0.25);
    pointer-events:none;
    opacity:0;transition:opacity 0.3s ease;
  }
  #header-indicator.show{opacity:1;}
  #header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
  .header-user{font-size:11px;color:var(--text3);letter-spacing:1px;text-align:right;}
  #jump-today-btn{display:none;background:none;border:1px solid var(--glass-border);color:var(--text2);padding:4px 12px;font-size:10px;letter-spacing:1px;border-radius:20px;cursor:pointer;font-family:inherit;}
  .lbl{font-size:10px;color:var(--text3);letter-spacing:3px;margin-bottom:4px;text-transform:uppercase;}
  #date-title{font-size:22px;font-weight:700;letter-spacing:-0.5px;}
  #progress-bar-wrap{height:2px;background:var(--glass-border);border-radius:2px;margin-top:14px;overflow:hidden;}
  #progress-bar{height:100%;width:0%;border-radius:2px;transition:width 0.5s ease;}
  #progress-meta{display:flex;justify-content:space-between;margin-top:7px;font-size:10px;color:var(--text3);}
  /* NAV */
  #nav{display:flex;border-bottom:1px solid var(--glass-border);overflow-x:auto;background:rgba(13,13,13,0.8);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);scrollbar-width:none;position:fixed;top:var(--header-h,110px);left:0;right:0;z-index:8;}
  #nav::-webkit-scrollbar{display:none;}
  .nav-btn{flex:1;min-width:48px;padding:13px 2px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);font-size:9px;letter-spacing:1px;cursor:pointer;text-transform:uppercase;font-family:inherit;white-space:nowrap;}
  .nav-btn.active{border-bottom:2px solid var(--text);color:var(--text);}
  #sub-nav{display:none;border-bottom:1px solid var(--glass-border);background:rgba(13,13,13,0.8);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:0 12px;position:fixed;top:var(--subnav-top,152px);left:0;right:0;z-index:7;}
  #sub-nav.visible{display:flex;gap:4px;}
  .sub-btn{flex:1;padding:7px 4px;text-align:center;background:none;border:none;border-radius:20px;color:var(--text3);font-size:8px;letter-spacing:1.5px;cursor:pointer;text-transform:uppercase;font-family:inherit;margin:6px 0;transition:background 0.15s,color 0.15s;}
  .sub-btn.active{background:rgba(255,255,255,0.08);color:var(--text);border-radius:20px;}
  /* BODY */
  .body{padding:16px;padding-top:8px;}
  .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  /* TASK ROWS */
  .task-row{display:flex;align-items:center;padding:14px 0;gap:14px;border-bottom:1px solid var(--glass-border);animation:fadeRow 0.2s ease;}
  .task-row-tappable{cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity 0.1s;}
  .task-row-tappable:active{opacity:0.6;}
  body.compact .task-row{padding:8px 0;}
  body.compact .task-name{font-size:13px;}
  body.compact .check-circle{width:22px;height:22px;}
  body.compact .card{padding:12px;}
  @keyframes fadeRow{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
  .check-circle{width:26px;height:26px;border-radius:50%;flex-shrink:0;cursor:pointer;border:1.5px solid rgba(255,255,255,0.12);background:none;display:flex;align-items:center;justify-content:center;transition:border-color 0.2s ease,background 0.2s ease,transform 0.2s ease;position:relative;}
  .check-circle:active{transform:scale(0.88);}
  .check-circle svg{opacity:0;transform:scale(0.4) rotate(-20deg);transition:opacity 0.22s cubic-bezier(0.34,1.56,0.64,1),transform 0.22s cubic-bezier(0.34,1.56,0.64,1);}
  .check-circle.done{border-color:transparent;background:linear-gradient(135deg,#4ade80,#22c55e);box-shadow:0 0 12px rgba(74,222,128,0.35);}
  .check-circle.done svg{opacity:1;transform:scale(1) rotate(0deg);}
  .check-circle.just-checked{animation:checkBounce 0.32s cubic-bezier(0.34,1.56,0.64,1);}

@keyframes checkBounce{
  0%{transform:scale(0.7);}
  55%{transform:scale(1.18);}
  80%{transform:scale(0.93);}
  100%{transform:scale(1);}
}

  .task-info{flex:1;min-width:0;}
  .task-name{font-size:14px;color:var(--text);word-break:break-word;}
  .task-name.done{color:var(--text3);text-decoration:line-through;}
  .task-time{font-size:11px;color:var(--text3);margin-top:3px;}
  .task-actions{display:flex;gap:6px;flex-shrink:0;}
  .edit-row{display:flex;flex-direction:column;gap:6px;flex:1;min-width:0;}
  .edit-bottom{display:flex;gap:6px;align-items:center;}
  /* BUTTONS */
  .btn-edit{background:none;border:1px solid var(--glass-border);color:var(--text2);padding:4px 10px;font-size:10px;border-radius:8px;cursor:pointer;font-family:inherit;}
  .btn-edit.active{background:var(--text);color:var(--bg);border-color:transparent;}
  .btn-del{background:none;border:1px solid rgba(248,113,113,0.3);color:#f87171;padding:4px 9px;font-size:11px;border-radius:8px;cursor:pointer;font-family:inherit;}
  .btn-move{background:none;border:1px solid var(--glass-border);color:var(--text2);padding:4px 8px;font-size:12px;border-radius:8px;cursor:pointer;font-family:inherit;}
  .btn-ok{background:var(--text);border:none;color:#0d0d0d;padding:7px 14px;border-radius:8px;cursor:pointer;font-size:11px;font-family:inherit;white-space:nowrap;flex-shrink:0;font-weight:600;}
  .btn-add{width:100%;background:var(--text);border:none;color:#0d0d0d;padding:12px;font-size:12px;letter-spacing:2px;border-radius:10px;cursor:pointer;font-family:inherit;font-weight:600;}
  /* INPUTS */
  .card{margin-top:16px;padding:16px;background:var(--glass);border-radius:var(--radius);border:1px solid var(--glass-border);}
  .inp{width:100%;background:var(--bg2);border:1px solid var(--glass-border);color:var(--text);padding:10px 13px;font-size:13px;border-radius:10px;font-family:inherit;margin-bottom:8px;display:block;}
  .inp:focus{outline:none;border-color:var(--glass-border);}
  .inp-time{width:90px;flex-shrink:0;margin-bottom:0;}
  /* WEEK */
  .week-row{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--glass-border);border-radius:6px;transition:background 0.15s;}
  .week-row[data-daykey]:active{background:rgba(255,255,255,0.05);}
  .week-day{width:38px;text-align:center;}
  .week-day-name{font-size:10px;color:var(--text3);}
  .week-day-num{font-size:18px;color:var(--text3);font-weight:300;}
  .week-day-num.today{font-weight:700;color:var(--text);}
  .bar-wrap{flex:1;height:3px;background:var(--glass-border);border-radius:3px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:3px;transition:width 0.4s ease;}
  .score-text{font-size:12px;width:34px;text-align:right;font-weight:500;}
  /* MONTH */
  .month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
  .month-day-header{font-size:9px;color:var(--text3);text-align:center;padding-bottom:10px;letter-spacing:0.5px;}
  .month-cell{aspect-ratio:1;border-radius:7px;background:var(--bg2);border:1px solid transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:filter 0.15s;}
  .month-cell[data-daykey]:active{filter:brightness(1.5);}
  .month-cell.today{border-color:var(--text2);}
  .month-cell.future{opacity:0.2;}
  .month-cell-num{font-size:10px;color:var(--text3);}
  .month-cell-num.today{color:var(--text);}
  .month-cell-pct{font-size:8px;}
  /* YEAR */
  .year-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--glass-border);border-radius:6px;transition:background 0.15s;}
  .year-row[data-monthkey]:active{background:rgba(255,255,255,0.05);}
  .year-month{width:28px;font-size:11px;color:var(--text3);}
  /* STAT */
  .stat-card{margin-top:14px;padding:18px;background:var(--glass);border-radius:var(--radius);border:1px solid var(--glass-border);}
  .stat-avg{font-size:34px;font-weight:700;margin-top:6px;}
  .stat-sub{font-size:11px;color:var(--text2);margin-top:5px;}
  /* REPORTS */
  .report-tabs{display:flex;gap:5px;margin-bottom:16px;}
  .rtab{flex:1;padding:8px 2px;background:var(--glass);border:1px solid var(--glass-border);color:var(--text3);font-size:9px;letter-spacing:1px;border-radius:10px;cursor:pointer;font-family:inherit;text-transform:uppercase;}
  .rtab.active{background:var(--bg4);border-color:var(--text2);color:var(--text);}
  .chart-wrap{background:var(--glass);border-radius:var(--radius);border:1px solid var(--glass-border);padding:16px;margin-bottom:12px;}
  .chart-title{font-size:10px;color:var(--text3);letter-spacing:2px;margin-bottom:12px;text-transform:uppercase;}
  canvas{width:100% !important;}
  .export-btn{width:100%;background:var(--glass);border:1px solid var(--glass-border);color:var(--text2);padding:12px;font-size:11px;letter-spacing:1px;border-radius:10px;cursor:pointer;font-family:inherit;text-transform:uppercase;margin-top:8px;}
  .export-btn:active{background:var(--bg3);}
  /* STREAK */
  .hidden{display:none;}
  .streak-wrap{display:flex;gap:10px;margin-bottom:18px;}
  .streak-box{flex:1;background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:18px 10px 14px;text-align:center;position:relative;overflow:hidden;}
  .streak-num{font-size:28px;font-weight:700;line-height:1;}
  .streak-lbl{font-size:8px;color:var(--text3);letter-spacing:2px;margin-top:6px;text-transform:uppercase;line-height:1.5;}
  .streak-icon{width:48px;height:48px;margin:0 auto 8px;position:relative;display:flex;align-items:center;justify-content:center;}

  /* ── FLAME ── */
  @keyframes flicker{0%,100%{transform:scaleY(1) scaleX(1);}25%{transform:scaleY(1.07) scaleX(0.95);}50%{transform:scaleY(0.94) scaleX(1.05);}75%{transform:scaleY(1.05) scaleX(0.97);}}
  @keyframes flicker-inner{0%,100%{transform:scaleY(1);}40%{transform:scaleY(1.12);}70%{transform:scaleY(0.88);}}
  @keyframes flame-glow{0%,100%{filter:drop-shadow(0 0 6px #f97316aa) drop-shadow(0 0 14px #f9731655);}50%{filter:drop-shadow(0 0 10px #fb923ccc) drop-shadow(0 0 22px #f9731688);}}
  @keyframes spark1{0%{opacity:0;transform:translate(0,0) scale(0);}20%{opacity:1;transform:translate(-7px,-10px) scale(1);}100%{opacity:0;transform:translate(-12px,-20px) scale(0.3);}}
  @keyframes spark2{0%{opacity:0;transform:translate(0,0) scale(0);}30%{opacity:1;transform:translate(6px,-12px) scale(1);}100%{opacity:0;transform:translate(10px,-22px) scale(0.2);}}
  @keyframes spark3{0%{opacity:0;transform:translate(0,0) scale(0);}25%{opacity:1;transform:translate(0px,-8px) scale(0.8);}100%{opacity:0;transform:translate(3px,-18px) scale(0);}}
  .s-flame-wrap{animation:flame-glow 1.6s ease-in-out infinite;position:relative;}
  .s-flame{width:32px;height:32px;animation:flicker 1.8s ease-in-out infinite;transform-origin:bottom center;}
  .s-flame .f-core{fill:url(#flameGrad);}
  .s-flame .f-inner{fill:#fbbf24;animation:flicker-inner 1.3s ease-in-out infinite;transform-origin:bottom center;}
  .s-flame .f-tip{fill:#fef9c3;}
  .s-spark{position:absolute;width:4px;height:4px;border-radius:50%;}
  .s-spark1{background:#fb923c;top:4px;left:6px;animation:spark1 1.4s ease-out infinite 0.1s;}
  .s-spark2{background:#fde68a;top:2px;right:5px;animation:spark2 1.6s ease-out infinite 0.5s;}
  .s-spark3{background:#f97316;top:0px;left:14px;animation:spark3 1.2s ease-out infinite 0.8s;}

  /* ── TROPHY ── */
  @keyframes trophy-float{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
  @keyframes trophy-glow{0%,100%{filter:drop-shadow(0 0 5px #facc15aa) drop-shadow(0 0 10px #facc1544);}50%{filter:drop-shadow(0 0 9px #fde047cc) drop-shadow(0 0 18px #facc1566);}}
  @keyframes star-twinkle{0%,100%{opacity:0;transform:scale(0.3);}50%{opacity:1;transform:scale(1);}}
  .s-trophy-wrap{animation:trophy-float 2.2s ease-in-out infinite;}
  .s-trophy{width:32px;height:32px;animation:trophy-glow 2.2s ease-in-out infinite;}
  .s-trophy .t-cup{fill:#facc15;}
  .s-trophy .t-shine{fill:#fef08a;opacity:0.55;}
  .s-trophy .t-base{fill:#a16207;}
  .t-star{position:absolute;font-size:7px;line-height:1;animation:star-twinkle 1.8s ease-in-out infinite;}
  .t-star1{top:0;left:2px;animation-delay:0s;color:#fde68a;}
  .t-star2{top:2px;right:1px;animation-delay:0.6s;color:#fbbf24;}
  .t-star3{top:-2px;left:14px;animation-delay:1.1s;color:#fef9c3;}

  /* ── SCORE BOLT ── */
  @keyframes bolt-glow-g{0%,100%{filter:drop-shadow(0 0 5px #4ade80bb) drop-shadow(0 0 12px #4ade8044);}50%{filter:drop-shadow(0 0 10px #4ade80ff) drop-shadow(0 0 22px #4ade8077);}}
  @keyframes bolt-glow-y{0%,100%{filter:drop-shadow(0 0 5px #facc15bb) drop-shadow(0 0 12px #facc1544);}50%{filter:drop-shadow(0 0 10px #facc15ff) drop-shadow(0 0 22px #facc1577);}}
  @keyframes bolt-glow-r{0%,100%{filter:drop-shadow(0 0 5px #f87171bb) drop-shadow(0 0 12px #f8717144);}50%{filter:drop-shadow(0 0 10px #f87171ff) drop-shadow(0 0 22px #f8717177);}}
  @keyframes bolt-float{0%,100%{transform:translateY(0) scaleY(1);}40%{transform:translateY(-3px) scaleY(1.04);}70%{transform:translateY(1px) scaleY(0.97);}}
  @keyframes bolt-spark-a{0%{opacity:0;transform:translate(0,0) scale(0);}30%{opacity:1;}100%{opacity:0;transform:translate(-9px,-12px) scale(0.4);}}
  @keyframes bolt-spark-b{0%{opacity:0;transform:translate(0,0) scale(0);}35%{opacity:1;}100%{opacity:0;transform:translate(9px,-10px) scale(0.3);}}
  @keyframes bolt-spark-c{0%{opacity:0;transform:translate(0,0) scale(0);}25%{opacity:1;}100%{opacity:0;transform:translate(0,-14px) scale(0.2);}}
  .s-bolt-wrap{position:relative;display:flex;align-items:center;justify-content:center;animation:bolt-float 2s ease-in-out infinite;}
  .b-spark{position:absolute;width:4px;height:4px;border-radius:50%;}
  .b-spark-a{top:4px;left:4px;animation:bolt-spark-a 1.5s ease-out infinite 0s;}
  .b-spark-b{top:2px;right:4px;animation:bolt-spark-b 1.5s ease-out infinite 0.55s;}
  .b-spark-c{top:0;left:50%;animation:bolt-spark-c 1.5s ease-out infinite 1s;}
  .cal-row{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px;}
  .cal-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
  .nav-arrow{background:var(--glass);border:1px solid var(--glass-border);color:var(--text2);padding:6px 14px;font-size:14px;border-radius:10px;cursor:pointer;font-family:inherit;}
  ::-webkit-scrollbar{width:0;}
  /* TASK DETAIL OVERLAY */
  #view-task-detail{position:fixed;inset:0;z-index:50;background:#0d0d0d;overflow-y:auto;display:none;padding-bottom:100px;}
  #view-task-detail.open{display:block;}
  .td-header{padding:16px 16px 14px;display:flex;align-items:center;gap:12px;position:sticky;top:0;background:rgba(13,13,13,0.95);backdrop-filter:blur(16px);z-index:2;border-bottom:1px solid var(--glass-border);}
  .td-back{background:none;border:1px solid var(--glass-border);color:var(--text2);padding:6px 14px;font-size:12px;border-radius:8px;cursor:pointer;font-family:inherit;flex-shrink:0;}
  .td-title{font-size:15px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .td-body{padding:16px;}

  /* ── COMPLETION POPUP ── */
  #completion-popup{
    display:none;position:fixed;inset:0;z-index:999;
    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(32px) saturate(1.4);
    -webkit-backdrop-filter:blur(32px) saturate(1.4);
    align-items:center;justify-content:center;flex-direction:column;
    padding:0;
  }
  #completion-popup.show{display:flex;animation:cp-bg-in 0.6s ease forwards;}
  @keyframes cp-bg-in{from{opacity:0;}to{opacity:1;}}

  /* Full-screen content — no card box, pure floating elements */
  #completion-card{
    position:relative;text-align:center;
    width:100%;padding:0 40px;
    animation:popup-in 0.7s cubic-bezier(0.34,1.4,0.64,1) forwards;
  }
  @keyframes popup-in{
    0%{opacity:0;transform:translateY(32px) scale(0.92);}
    100%{opacity:1;transform:translateY(0) scale(1);}
  }

  /* Close pill — top centre, iOS style */
  .cp-close{
    position:fixed;top:52px;left:50%;transform:translateX(-50%);
    background:rgba(255,255,255,0.15);
    border:none;color:rgba(255,255,255,0.8);
    padding:8px 20px;border-radius:20px;
    font-size:11px;letter-spacing:2px;text-transform:uppercase;
    cursor:pointer;font-family:inherit;
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    transition:background 0.2s;
  }
  .cp-close:active{background:rgba(255,255,255,0.25);}

  #cp-icon{
    width:100px;height:100px;margin:0 auto 40px;
    filter:drop-shadow(0 0 30px rgba(74,222,128,0.4));
    animation:cp-icon-breathe 2.5s ease-in-out infinite;
  }
  @keyframes cp-icon-breathe{
    0%,100%{filter:drop-shadow(0 0 24px rgba(74,222,128,0.35));}
    50%{filter:drop-shadow(0 0 48px rgba(74,222,128,0.65));}
  }

  #cp-title{
    font-size:36px;font-weight:200;color:#ffffff;
    letter-spacing:6px;text-transform:uppercase;
    margin-bottom:16px;line-height:1;
  }
  #cp-sub{
    font-size:12px;color:rgba(255,255,255,0.7);
    line-height:2;letter-spacing:2px;
    text-transform:uppercase;margin-bottom:60px;
  }
  #cp-dismiss{
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.25);
    color:rgba(255,255,255,0.9);
    padding:16px 48px;font-size:11px;letter-spacing:3px;
    border-radius:40px;cursor:pointer;
    font-family:inherit;text-transform:uppercase;
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    transition:background 0.2s,border-color 0.2s;
  }
  #cp-dismiss:active{background:rgba(255,255,255,0.22);border-color:rgba(255,255,255,0.4);}
  .cp-particle{position:fixed;pointer-events:none;z-index:998;border-radius:50%;}
  @keyframes particle-rise{0%{transform:translate(0,0) scale(1);opacity:1;}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0;}}
</style>

// Derive a full theme object from 5 user colours
function buildCustomTheme(bg, accent, text, text2hex, text3hex){
  // Convert hex to rgba helper
  function h2r(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return 'rgba('+r+','+g+','+b+','+a+')';}
  // Lighten bg slightly for card/cell
  function lighten(h,amt){let r=parseInt(h.slice(1,3),16)+amt,g=parseInt(h.slice(3,5),16)+amt,b=parseInt(h.slice(5,7),16)+amt;r=Math.min(255,r);g=Math.min(255,g);b=Math.min(255,b);return '#'+r.toString(16).padStart(2,'0')+g.toString(16).padStart(2,'0')+b.toString(16).padStart(2,'0');}
  const isDark=parseInt(bg.slice(1,3),16)<128;
  const mixAlpha=isDark?1:0;
  const bgCard=lighten(bg,isDark?8:-6);
  const bgCell=lighten(bg,isDark?14:-10);
  const bgLift=lighten(bg,isDark?22:-14);
  const navBg='rgba('+parseInt(bg.slice(1,3),16)+','+parseInt(bg.slice(3,5),16)+','+parseInt(bg.slice(5,7),16)+',0.96)';
  return {
    name:'Custom',desc:'Your custom palette',
    bg,bgCard,bgCell,bgLift,
    nav:navBg,navBorder:h2r(accent,0.15),
    glass:h2r(accent,0.05),glassBorder:h2r(accent,0.14),bg2:h2r(accent,0.04),
    text,text2:h2r(text2hex.startsWith('#')?text2hex:text,0.5),text3:h2r(text3hex.startsWith('#')?text3hex:text,0.28),
    accent,accentGlow:h2r(accent,0.38),
    preview:[bg,bgCard,accent],
    _custom:true,_bg:bg,_accent:accent,_text:text,_text2:text2hex,_text3:text3hex
  };
}

function clr(s){ return s>=80?"#4ade80":s>=50?"#facc15":s>0?"#f87171":"rgba(255,255,255,0.08)"; }
function scoreOf(log, dayKey){
  if(!log) return 0;
  const key = dayKey || getTodayKey();
  const hidden = log.__hiddenIds || [];
  const baseIds = log.__taskIds ? log.__taskIds : tasks.map(t=>t.id);
  const ids = baseIds.filter(id=>{
    if(hidden.includes(id)) return false;
    const t=tasks.find(t=>t.id===id);
    if(!t) return false; 
    if(t.deletedAt && t.deletedAt<=key) return false; 
    return true;
  });
  if(!ids.length) return 0;
  const done = ids.filter(id=>log[id]).length;
  return Math.round((done/ids.length)*100);
}
function visibleTasksForDay(log, dayKey){
  const hidden = (log&&log.__hiddenIds)||[];
  const key = dayKey || getTodayKey();
  if(log&&log.__taskIds){
    const ids = log.__taskIds.filter(id=>!hidden.includes(id));
    return ids.map(id=>tasks.find(t=>t.id===id&&(!t.deletedAt||t.deletedAt>key))).filter(Boolean);
  } else {
    return tasks.filter(t=>!hidden.includes(t.id)&&(!t.createdAt||t.createdAt<=key)&&(!t.deletedAt||t.deletedAt>key));
  }
}
function persist(){sv("rm_tasks",tasks);sv("rm_logs",logs);sv("rm_username",userName);sv("rm_macros",macros);sv("rm_appname",appName);sv("rm_groups",groups);sv("rm_week_start",weekStartsMonday);sv("rm_compact",compactMode);sv("rm_score_fmt",scoreFormat);sv("rm_week_nums",showWeekNumbers);sv("rm_auto_collapse",autoCollapseGroups);sv("rm_intention",dailyIntention);sv("rm_reminder_time",reminderTime);sv("rm_reminder_on",reminderEnabled);sv("rm_tracking_since",trackingSince);sv("rm_clock_font",clockFont);sv("rm_clock_style",clockStyle);sv("rm_clock_format",clockFormat);sv("rm_clock_seconds",clockSeconds);sv("rm_clock_landscape",clockLandscape);}

  minimal:{letterSpacing:"2px",opacity:"0.6"},

};
function clockFontFamily(){ return (CLOCK_FONTS[clockFont]||CLOCK_FONTS.cormorant).family; }
function clockFontWeight(){ return (CLOCK_FONTS[clockFont]||CLOCK_FONTS.cormorant).weight; }
function clockStyleCSS(){ return CLOCK_STYLE_CSS[clockStyle]||CLOCK_STYLE_CSS.default; }
function formatClockTime(now){
  var h=now.getHours(), m=now.getMinutes(), s=now.getSeconds();
  var h12=h%12||12;
  var hStr=clockFormat==="24"?String(h).padStart(2,"0"):String(h12);
  var mStr=String(m).padStart(2,"0");
  var sStr=String(s).padStart(2,"0");
  return clockSeconds? hStr+":"+mStr+":"+sStr : hStr+":"+mStr;
}

function launchConfetti(){
  // Minimal glow particle burst from screen centre
  const colors=["#4ade80","#86efac","rgba(255,255,255,0.5)","rgba(255,255,255,0.3)"];
  const cx=window.innerWidth/2;
  const cy=window.innerHeight/2;
  const count=22;
  for(let i=0;i<count;i++){
    const el=document.createElement("div");
    el.className="cp-particle";
    const size=Math.random()*4+2;
    const color=colors[Math.floor(Math.random()*colors.length)];
    const angle=(i/count)*Math.PI*2+(Math.random()-0.5)*0.4;
    const dist=Math.random()*120+80;
    const tx=Math.cos(angle)*dist+"px";
    const ty=Math.sin(angle)*dist+"px";
    const dur=Math.random()*0.5+0.8;
    const delay=Math.random()*0.1;
    el.style.cssText=`width:${size}px;height:${size}px;background:${color};left:${cx}px;top:${cy}px;--tx:${tx};--ty:${ty};animation:particle-rise ${dur}s ${delay}s cubic-bezier(0.15,0,0.7,1) forwards;box-shadow:0 0 8px ${color};`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),(dur+delay)*1000+100);
  }
}

function checkAllTasksDone(dayKey){
  // Only fire for today, not past days
  if(dayKey!==getTodayKey()) return;
  const log=logs[dayKey]||{};
  const vt=visibleTasksForDay(log,dayKey);
  if(vt.length===0) return; // no tasks, skip
  const allDone=vt.every(t=>log[t.id]);
  if(allDone) showCompletionPopup(dayKey);
}

    <div class="lbl">${isLiveToday?"Today's Tasks":"Tasks — "+activeKey}</div>

function renderWeek(){

  const weekDates=Array.from({length:7},(_,i)=>{ const d=new Date(base); d.setDate(base.getDate()-base.getDay()+i); return d; });
  const weekStart=weekDates[0], weekEnd=weekDates[6];
  const label=weekStart.toLocaleDateString("en-IN",{day:"numeric",month:"short"})+" – "+weekEnd.toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"});
  let total=0,cnt=0;
  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <button id="week-prev" style="background:none;border:1px solid var(--glass-border);color:var(--text2);padding:5px 13px;font-size:13px;border-radius:4px;cursor:pointer">‹</button>

      <div style="font-size:11px;color:var(--text);font-weight:700">${weekOffset===0?"This Week":label}</div>

    </div>
    <button id="week-next" style="background:none;border:1px solid var(--glass-border);color:${weekOffset<0?'var(--text2)':'var(--glass-border)'};padding:5px 13px;font-size:13px;border-radius:4px;cursor:pointer;pointer-events:${weekOffset<0?'auto':'none'}">›</button>
  </div>`;
  weekDates.forEach(d=>{
    const k=toKey(d); const sc=scoreOf(logs[k],k);
    const isToday=k===getTodayKey(); const future=k>getTodayKey();
    if(!future){total+=sc;cnt++;}
    const weekRowAttr = future ? "" : 'data-daykey="'+k+'"';
    html+=`<div class="week-row" style="opacity:${future?0.3:1};cursor:${future?"default":"pointer"}" ${weekRowAttr}>
      <div class="week-day">
        <div class="week-day-name">${DAYS[d.getDay()]}</div>
        <div class="week-day-num ${isToday?'today':''}">${d.getDate()}</div>
      </div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${future?0:sc}%;background:${clr(sc)}"></div></div>
      <div class="score-text" style="color:${clr(sc)}">${future?"—":sc+"%"}</div>
    </div>`;
  });
  const avg=cnt?Math.round(total/cnt):0;
  html+=`<div class="stat-card"><div class="lbl">Week Avg</div><div class="stat-avg" style="color:${clr(avg)}">${avg}%</div></div>`;

  el.innerHTML=html;

}


function renderMonth(){
  const el=document.getElementById("view-month");
  const base=new Date(getToday().getFullYear(), getToday().getMonth()+monthOffset, 1);
  const yr=base.getFullYear(), mo=base.getMonth();
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  const firstDay=new Date(yr,mo,1).getDay();
  const monthDates=Array.from({length:daysInMonth},(_,i)=>new Date(yr,mo,i+1));
  const canNext=monthOffset<0;
  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <button id="month-prev" style="background:none;border:1px solid var(--glass-border);color:var(--text2);padding:5px 13px;font-size:13px;border-radius:4px;cursor:pointer">‹</button>

  </div><div class="month-grid">`;
  DAYS.forEach(d=>{html+=`<div class="month-day-header">${d}</div>`;});
  html+='</div><div class="month-grid">';
  for(let i=0;i<firstDay;i++) html+=`<div></div>`;
  let total=0,cnt=0,strong=0;
  monthDates.forEach(d=>{
    const k=toKey(d); const sc=scoreOf(logs[k],k);
    const isToday=k===getTodayKey(); const future=k>getTodayKey();
    if(!future){total+=sc;cnt++;if(sc>=80)strong++;}
    const bg=future?"var(--bg-card)":sc===0?"var(--bg-cell)":clr(sc)+"25";
    const monthCellAttr = future ? "" : 'data-daykey="'+k+'"';
    html+=`<div class="month-cell ${isToday?"today":""} ${future?"future":""}" style="background:${bg};cursor:${future?"default":"pointer"}" ${monthCellAttr}>
      <div class="month-cell-num ${isToday?'today':''}">${d.getDate()}</div>
      ${!future&&sc>0?'<div class="month-cell-pct" style="color:'+clr(sc)+'">'+sc+'%</div>':''}
    </div>`;
  });
  const avg=cnt?Math.round(total/cnt):0;

function getDayData(){
  const base=new Date(getToday());
  base.setDate(base.getDate()+reportOffset);
  const k=toKey(base);
  const log=logs[k]||{};
  const vt=visibleTasksForDay(log,k);
  const isToday=reportOffset===0;
  return {
    labels: vt.map(t=>t.name.length>12?t.name.slice(0,12)+"…":t.name),
    scores: vt.map(t=>log[t.id]?100:0),
    title: isToday?"Today":base.toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"}),
    canNext: reportOffset<0
  };
}

function getWeekData(){const base=new Date(getToday());base.setDate(base.getDate()+reportOffset*7);const todayK=getTodayKey();const dates=Array.from({length:7},(_,i)=>{const d=new Date(base);d.setDate(base.getDate()-base.getDay()+i);return d;});const label=toKey(dates[0])+" to "+toKey(dates[6]);return{labels:dates.map(d=>DAYS[d.getDay()]),scores:dates.map(d=>{const k=toKey(d);return k>todayK?null:scoreOf(logs[k],k);}),title:reportOffset===0?"This Week":label,canNext:reportOffset<0};}

function getMonthData(){const base=new Date(getToday().getFullYear(),getToday().getMonth()+reportOffset,1);const yr=base.getFullYear(),mo=base.getMonth(),todayK=getTodayKey();const daysInMonth=new Date(yr,mo+1,0).getDate();const dates=Array.from({length:daysInMonth},(_,i)=>new Date(yr,mo,i+1));return{labels:dates.map(d=>d.getDate()+""),scores:dates.map(d=>{const k=toKey(d);return k>todayK?null:scoreOf(logs[k],k);}),title:MONTHS[mo]+" "+yr,canNext:reportOffset<0};}

function getYearData(){const yr=getToday().getFullYear()+reportOffset,todayK=getTodayKey();return{labels:MONTHS,scores:MONTHS.map((_,mi)=>{const mDays=new Date(yr,mi+1,0).getDate();const mDates=Array.from({length:mDays},(_,i)=>new Date(yr,mi,i+1));const past=mDates.filter(d=>toKey(d)<=todayK);if(!past.length)return toKey(new Date(yr,mi,1))>todayK?null:0;return Math.round(past.reduce((a,d)=>a+scoreOf(logs[toKey(d)],toKey(d)),0)/past.length);}),title:yr+"",canNext:reportOffset<0};}

function getReportData(){
  if(reportPeriod==="day") return getDayData();
  if(reportPeriod==="week") return getWeekData();
  if(reportPeriod==="month") return getMonthData();
  return getYearData();
}

function getPieData(){
  const data=getReportData();
  const valid=data.scores.filter(s=>s!==null);
  return {
    strong: valid.filter(s=>s>=80).length,
    partial: valid.filter(s=>s>=50&&s<80).length,
    weak: valid.filter(s=>s>0&&s<50).length,
    zero: valid.filter(s=>s===0).length
  };
}

function destroyChart(id){ if(chartInstances[id]){ chartInstances[id].destroy(); delete chartInstances[id]; } }
function destroyAllCharts(){ ["bar","pie","tasks","radar","hist","dow"].forEach(destroyChart); }

function reportTitle(){const d=getReportData();return(d&&d.title)||getToday().getFullYear()+"";}


function getTasksWindowKeys(){
  const todayK = getTodayKey();
  if(tasksSubPeriod==="month"){
    const base=new Date(getToday().getFullYear(), getToday().getMonth()+tasksOffset, 1);
    const yr=base.getFullYear(), mo=base.getMonth();
    const days=new Date(yr,mo+1,0).getDate();
    const keys=[];
    for(let i=1;i<=days;i++){
      const k=toKey(new Date(yr,mo,i));
      if(k<=todayK) keys.push(k);
    }
    return {keys, label:MONTHS[mo]+" "+yr, canNext:tasksOffset<0};
  } else if(tasksSubPeriod==="year"){
    const yr=getToday().getFullYear()+tasksOffset;
    const keys=Object.keys(logs).filter(k=>k.startsWith(yr+"")&&k<=todayK).sort();
    return {keys, label:yr+"", canNext:tasksOffset<0};
  } else {
    const keys=Object.keys(logs).filter(k=>k<=todayK).sort();
    return {keys, label:"All Time", canNext:false};
  }
}

function getTasksPerformanceData(){
  const {keys} = getTasksWindowKeys();
  return tasks.map(t=>{
    let active=0, done=0;
    keys.forEach(k=>{
      const log=logs[k];
      if(!log||!log.__taskIds) return;
      const hidden=(log.__hiddenIds)||[];
      if(!log.__taskIds.includes(t.id)||hidden.includes(t.id)) return;
      if(t.deletedAt&&k>=t.deletedAt) return;
      active++;
      if(log[t.id]) done++;
    });
    const rate=active>0?Math.round((done/active)*100):0;
    const deleted=!!(t.deletedAt&&t.deletedAt<=getTodayKey());
    return {id:t.id, name:(deleted?"● ":"◉ ")+t.name, done, active, rate, deleted};
  }).filter(t=>t.active>0); 
}

        ...(reportPeriod!=="day"?[{type:"line",data:trendData,borderColor:cssVar("--accent")||"#6366f1",borderWidth:2,pointRadius:0,tension:0.4,fill:false,order:1,label:"Trend"}]:[])
      ]
    },
    options:{responsive:true,plugins:{legend:{display:reportPeriod!=="day",labels:{color:cssVar("--text2"),font:{size:9},boxWidth:10}},tooltip:{callbacks:{label:ctx=>ctx.dataset.label?ctx.dataset.label+": "+ctx.raw+"%":ctx.raw+"%"}}},
      scales:{y:{min:0,max:100,ticks:{color:cssVar("--text3"),font:{size:9},callback:v=>v+"%"},grid:{color:cssVar("--glass-border")}},x:{ticks:{color:cssVar("--text3"),font:{size:9}},grid:{display:false}}}}
  });

  // Doughnut
  const pieCtx=document.getElementById("pie-chart").getContext("2d");
  destroyChart("pie");
  chartInstances["pie"]=new Chart(pieCtx,{
    type:"doughnut",
    data:{labels:["Strong 80%+","Partial 50-79%","Weak 1-49%","Missed"],
      datasets:[{data:[pieData.strong,pieData.partial,pieData.weak,pieData.zero],backgroundColor:["#4ade8088","#facc1588","#f8717188",cssVar("--glass-border")],borderColor:["#4ade80","#facc15","#f87171",cssVar("--glass-border")],borderWidth:1}]},
    options:{responsive:true,plugins:{legend:{display:true,position:"bottom",labels:{color:cssVar("--text2"),font:{size:9},padding:8,boxWidth:10}},tooltip:{callbacks:{label:ctx=>ctx.label+": "+ctx.raw+" days"}}}}
  });

  if(reportPeriod!=="day"){
    // Score Distribution Histogram (10 buckets 0-9%, 10-19%...90-100%)
    const buckets=Array(10).fill(0);
    valid.forEach(s=>{ buckets[Math.min(9,Math.floor(s/10))]++; });
    const histCtx=document.getElementById("hist-chart").getContext("2d");
    destroyChart("hist");
    chartInstances["hist"]=new Chart(histCtx,{
      type:"bar",
      data:{
        labels:["0-9","10-19","20-29","30-39","40-49","50-59","60-69","70-79","80-89","90-100"],
        datasets:[{data:buckets,backgroundColor:["#f87171","#f87171","#f87171","#f87171","#f87171","#facc15","#facc15","#facc15","#4ade80","#4ade80"].map(c=>c+"88"),borderColor:["#f87171","#f87171","#f87171","#f87171","#f87171","#facc15","#facc15","#facc15","#4ade80","#4ade80"],borderWidth:1,borderRadius:3}]
      },
      options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.raw+" days"}}},
        scales:{y:{ticks:{color:cssVar("--text3"),font:{size:9}},grid:{color:cssVar("--glass-border")}},x:{ticks:{color:cssVar("--text3"),font:{size:8}},grid:{display:false}}}}
    });

    // Day-of-week analysis
    const todayK=getTodayKey();
    const dowTotals=Array(7).fill(0), dowCounts=Array(7).fill(0);
    Object.keys(logs).filter(k=>k.match(/^\d{4}-\d{2}-\d{2}$/)&&k<=todayK).forEach(k=>{
      const [y,m,d]=k.split("-").map(Number);
      const dow=new Date(y,m-1,d).getDay();
      const sc=scoreOf(logs[k],k);
      if(sc>0){ dowTotals[dow]+=sc; dowCounts[dow]++; }
    });
    const dowAvg=dowTotals.map((t,i)=>dowCounts[i]?Math.round(t/dowCounts[i]):0);
    const bestDow=dowAvg.indexOf(Math.max(...dowAvg));
    const dowCtx=document.getElementById("dow-chart").getContext("2d");
    destroyChart("dow");
    chartInstances["dow"]=new Chart(dowCtx,{
      type:"bar",
      data:{
        labels:["Sun","Mon","Tue","Wed","Thu","Fri","Sat"],
        datasets:[{data:dowAvg,backgroundColor:dowAvg.map((s,i)=>i===bestDow?clr(s)+"cc":clr(s)+"55"),borderColor:dowAvg.map(s=>clr(s)),borderWidth:1,borderRadius:3}]
      },
      options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.raw+"%"}}},
        scales:{y:{min:0,max:100,ticks:{color:cssVar("--text3"),font:{size:9},callback:v=>v+"%"},grid:{color:cssVar("--glass-border")}},x:{ticks:{color:cssVar("--text3"),font:{size:9}},grid:{display:false}}}}
    });
  }

  // Summary text
  document.getElementById("summary-text").innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div><div style="font-size:11px;color:var(--text2)">Average</div><div style="font-size:16px;font-weight:600;color:${clr(avg)}">${avg}%</div></div>
      <div><div style="font-size:11px;color:var(--text2)">Strong days</div><div style="font-size:16px;font-weight:600;color:#4ade80">${pieData.strong}</div></div>
      <div><div style="font-size:11px;color:var(--text2)">Partial days</div><div style="font-size:16px;font-weight:600;color:#facc15">${pieData.partial}</div></div>
      <div><div style="font-size:11px;color:var(--text2)">Missed days</div><div style="font-size:16px;font-weight:600;color:#f87171">${pieData.zero}</div></div>
    </div>
  `;
}

      </div>
    </div>
  `;
}

// Returns day-specific macro tasks (per-day, stored in logs[date].__macroTasks)
function getDayMacros(dayKey){
  const dl=logs[dayKey]||{};
  return dl.__macroTasks||[];
}
// Returns macro completion % for a single day key
function macroScoreOf(dayKey){
  const dayMacros=getDayMacros(dayKey);
  if(!dayMacros.length) return 0;
  const dl=logs[dayKey]||{};
  const md=dl.__macros||{};
  const done=dayMacros.filter(m=>md[m.id]).length;
  return Math.round((done/dayMacros.length)*100);
}

function renderMacros(){
  const el=document.getElementById("view-macros");
  const activeKey=macroViewKey||getTodayKey();
  const isToday=activeKey===getTodayKey();
  const [ay,am,ad]=activeKey.split("-").map(Number);
  const activeDate=new Date(ay,am-1,ad);
  const canGoNext=toKey(new Date(ay,am-1,ad+1))<=getTodayKey();
  const log=logs[activeKey]||{};
  // Each day's macros are isolated — macroDone only reflects THIS day
  const macroDone=log.__macros||{};

  if(!window.macroPreviewMode) window.macroPreviewMode="month";
  if(window.macroPreviewOffset===undefined) window.macroPreviewOffset=0;

  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;background:var(--glass);border-radius:12px;padding:10px 14px;border:1px solid var(--glass-border)">
    <button id="macro-day-prev" style="background:none;border:1px solid var(--glass-border);color:var(--text2);padding:4px 12px;font-size:14px;border-radius:8px;cursor:pointer;font-family:inherit">&#8249;</button>
    <div style="text-align:center">
      <div style="font-size:12px;font-weight:600;color:${isToday?"var(--text)":"var(--text2)"}">${isToday?"Today":activeDate.toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"})}</div>
      ${!isToday?'<div style="font-size:9px;color:var(--text3);letter-spacing:2px;margin-top:2px">PAST DAY</div>':""}
    </div>
    <button id="macro-day-next" style="background:none;border:1px solid var(--glass-border);color:${canGoNext?"var(--text2)":"var(--text3)"};padding:4px 12px;font-size:14px;border-radius:8px;cursor:pointer;font-family:inherit;pointer-events:${canGoNext?"auto":"none"}">&#8250;</button>
  </div>
  <div class="section-header" style="margin-bottom:6px"><div class="lbl">Macros — Today's List</div><button class="btn-edit ${macroEditMode?"active":""}" id="macro-edit-toggle">${macroEditMode?"Done":"Edit"}</button></div>
  <div style="font-size:10px;color:var(--text3);margin:0 0 10px;letter-spacing:1px;">Resets fresh each day. Enter today's mini-tasks freely.</div>`;

  // Per-day macros: stored in logs[activeKey].__macroTasks
  const dayMacroTasks=getDayMacros(activeKey);
  dayMacroTasks.forEach(function(m){
    if(macroEditMode){
      if(macroEditId===m.id){
        html+=`<div class="task-row"><div class="edit-row"><input class="inp" id="macro-edit-inp" value="${m.name.replace(/"/g,"&quot;")}" style="margin-bottom:0"><button class="btn-ok" id="macro-save-btn" style="margin-left:8px">OK</button></div></div>`;
      }else{
        html+=`<div class="task-row"><div class="task-info"><div class="task-name">${m.name}</div></div><div class="task-actions"><button class="btn-edit" data-macro-edit="${m.id}">edit</button><button class="btn-del" data-macro-del="${m.id}">&#215;</button></div></div>`;
      }
    }else{
      const done=!!macroDone[m.id];
      html+=`<div class="task-row"><div class="check-circle ${done?"done":""}" data-macro-toggle="${m.id}"><svg width="13" height="10" viewBox="0 0 13 10" fill="none"><polyline points="1.5,5 5,8.5 11.5,1.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="task-info"><div class="task-name ${done?"done":""}">${m.name}</div></div></div>`;
    }
  });

  if(dayMacroTasks.length===0&&!macroEditMode)html+=`<div style="font-size:13px;color:var(--text3);text-align:center;padding:32px 0">No macros for this day.<br>${isToday?"Tap Edit to add.":"Past day — view only."}</div>`;
  if(macroEditMode)html+=`<div class="card"><div class="lbl" style="margin-bottom:10px">Add Macro for This Day</div><input class="inp" id="macro-new-inp" placeholder="Task name"><button class="btn-add" id="macro-add-btn">Add</button></div>`;

  // ── MONTH / YEAR TAB VIEWS ────────────────────────────────────────────
  const pMode=window.macroPreviewMode;
  const pOffset=window.macroPreviewOffset;
  const canNext=pOffset<0;

  if(pMode==="month"){
    const base=new Date(getToday().getFullYear(), getToday().getMonth()+pOffset, 1);
    const pyr=base.getFullYear(), pmo=base.getMonth();
    const daysInMonth=new Date(pyr,pmo+1,0).getDate();
    const firstDay=new Date(pyr,pmo,1).getDay();
    const monthDates=Array.from({length:daysInMonth},(_,i)=>new Date(pyr,pmo,i+1));

    // Nav bar
    const macroMonthIsNow=pOffset===0;
    html+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-top:20px;margin-bottom:14px">
      <button id="macro-preview-prev" style="background:none;border:1px solid var(--glass-border);color:var(--text2);padding:5px 13px;font-size:13px;border-radius:4px;cursor:pointer">&#8249;</button>
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
        <div style="display:flex;gap:6px">
          <button id="macro-preview-month" class="rtab active" style="padding:4px 12px;font-size:9px">Month</button>
          <button id="macro-preview-year" class="rtab" style="padding:4px 12px;font-size:9px">Year</button>
        </div>
        <div style="font-size:13px;color:var(--text);font-weight:600;letter-spacing:0.5px">${MONTHS[pmo]} ${pyr}</div>
        ${!macroMonthIsNow?`<button id="macro-jump-today" style="background:var(--accent);color:var(--bg);border:none;padding:5px 16px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px;cursor:pointer;font-family:monospace;box-shadow:0 0 12px var(--accent-glow)">↩ Today</button>`:''}
      </div>
      <button id="macro-preview-next" style="background:none;border:1px solid var(--glass-border);color:${canNext?"var(--text2)":"var(--glass-border)"};padding:5px 13px;font-size:13px;border-radius:4px;cursor:pointer;pointer-events:${canNext?"auto":"none"}">&#8250;</button>
    </div>`;

    // Month grid (calendar)
    html+=`<div class="month-grid">`;
    DAYS.forEach(d=>{html+=`<div class="month-day-header">${d}</div>`;});
    html+=`</div><div class="month-grid">`;
    for(let i=0;i<firstDay;i++) html+=`<div></div>`;
    let mDone=0, mCnt=0, mStrong=0;
    monthDates.forEach(d=>{
      const k=toKey(d);
      const sc=macroScoreOf(k);
      const isT=k===getTodayKey(); const future=k>getTodayKey();
      if(!future){mDone+=sc; mCnt++; if(sc>=80)mStrong++;}
      const bg=future?"var(--bg-card)":sc===0?"var(--bg-cell)":clr(sc)+"25";
      const clickAttr=(!future)?`data-macro-jump="${k}" style="background:${bg};cursor:pointer"`:`style="background:${bg}"`;
      html+=`<div class="month-cell ${isT?"today":""} ${future?"future":""}" ${clickAttr}>
        <div class="month-cell-num ${isT?"today":""}">${d.getDate()}</div>
        ${!future&&sc>0?'<div class="month-cell-pct" style="color:'+clr(sc)+'">'+sc+'%</div>':''}
      </div>`;
    });
    const mavg=mCnt?Math.round(mDone/mCnt):0;
    html+=`</div>`;

    // Stat card
    html+=`<div class="stat-card"><div class="lbl">Month Avg (Macros)</div><div class="stat-avg" style="color:${clr(mavg)}">${mavg}%</div><div class="stat-sub">${mStrong} strong days</div></div>`;

    // Line chart
    html+=`<div class="chart-wrap" style="margin-top:12px"><div class="chart-title">Daily Macro Score — ${MONTHS[pmo]} ${pyr}</div><canvas id="macro-month-canvas" height="120"></canvas></div>`;

  } else {
    // YEAR VIEW
    const pyr=getToday().getFullYear()+Math.floor(pOffset/12);
    const canNextY=Math.floor(pOffset/12)<0;

    html+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-top:20px;margin-bottom:14px">
      <button id="macro-preview-prev" style="background:none;border:1px solid var(--glass-border);color:var(--text2);padding:5px 13px;font-size:13px;border-radius:4px;cursor:pointer">&#8249;</button>
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
        <div style="display:flex;gap:6px">
          <button id="macro-preview-month" class="rtab" style="padding:4px 12px;font-size:9px">Month</button>
          <button id="macro-preview-year" class="rtab active" style="padding:4px 12px;font-size:9px">Year</button>
        </div>
        <div style="font-size:13px;color:var(--text);font-weight:600;letter-spacing:0.5px">${pyr}</div>
        ${Math.floor(pOffset/12)<0?`<button id="macro-jump-today" style="background:var(--accent);color:var(--bg);border:none;padding:5px 16px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px;cursor:pointer;font-family:monospace;box-shadow:0 0 12px var(--accent-glow)">↩ Today</button>`:''}
      </div>
      <button id="macro-preview-next" style="background:none;border:1px solid var(--glass-border);color:${canNextY?"var(--text2)":"var(--glass-border)"};padding:5px 13px;font-size:13px;border-radius:4px;cursor:pointer;pointer-events:${canNextY?"auto":"none"}">&#8250;</button>
    </div>`;

    // Year rows (like renderYear)
    let yStrong=0, yTracked=0;
    MONTHS.forEach((m,mi)=>{
      const mDays=new Date(pyr,mi+1,0).getDate();
      const mDates=Array.from({length:mDays},(_,i)=>new Date(pyr,mi,i+1));
      const past=mDates.filter(d=>toKey(d)<=getTodayKey());
      const avg=past.length?Math.round(past.reduce((a,d)=>a+macroScoreOf(toKey(d)),0)/past.length):null;
      const isFutureMonth=toKey(new Date(pyr,mi,1))>getTodayKey();
      if(!isFutureMonth){ yStrong+=past.filter(d=>macroScoreOf(toKey(d))>=80).length; yTracked+=past.filter(d=>{const k=toKey(d);return (logs[k]&&logs[k].__macros&&Object.keys(logs[k].__macros).length>0);}).length; }
      const macroYrKey=pyr+"-"+String(mi+1).padStart(2,"0");
      const macroYrAttr=isFutureMonth?"":"data-macro-monthkey=\""+macroYrKey+"\"";
      html+=`<div class="year-row" style="opacity:${isFutureMonth?0.25:1};cursor:${isFutureMonth?"default":"pointer"};border-radius:6px;transition:background 0.15s;" ${macroYrAttr}>
        <div class="year-month">${m}</div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${avg||0}%;background:${clr(avg||0)}"></div></div>
        <div class="score-text" style="color:${clr(avg||0)}">${avg===null?"—":avg+"%"}</div>
      </div>`;
    });
    html+=`<div class="stat-card"><div class="lbl">Year Summary (Macros)</div><div class="stat-sub" style="margin-top:8px">${yStrong} strong days in ${pyr}</div><div class="stat-sub">${yTracked} days with macros logged</div></div>`;

    // Bar chart
    html+=`<div style="margin-top:12px"><div class="chart-title" style="margin-bottom:8px">Monthly Macro Avg — ${pyr}</div><div id="macro-year-list"></div></div>`;
  }

  el.innerHTML=html;

  // Wire up nav buttons
  const macroJumpBtn=document.getElementById("macro-jump-today");
  if(macroJumpBtn) macroJumpBtn.onclick=()=>{ window.macroPreviewOffset=0; renderMacros(); };
  document.getElementById("macro-preview-prev").onclick=()=>{
    if(window.macroPreviewMode==="year") window.macroPreviewOffset-=12;
    else window.macroPreviewOffset--;
    renderMacros();
  };
  document.getElementById("macro-preview-next").onclick=()=>{
    if(window.macroPreviewMode==="year"){ if(window.macroPreviewOffset<0){window.macroPreviewOffset+=12;renderMacros();} }
    else { if(window.macroPreviewOffset<0){window.macroPreviewOffset++;renderMacros();} }
  };
  document.getElementById("macro-preview-month").onclick=()=>{
    window.macroPreviewMode="month"; window.macroPreviewOffset=0; renderMacros();
  };
  document.getElementById("macro-preview-year").onclick=()=>{
    window.macroPreviewMode="year";
    window.macroPreviewOffset=Math.floor(window.macroPreviewOffset/12)*12;
    renderMacros();
  };

  // Draw charts
  setTimeout(()=>{
    try{
      if(typeof Chart==="undefined") return;
      const base2=new Date(getToday().getFullYear(), getToday().getMonth()+window.macroPreviewOffset, 1);
      const pyr2=base2.getFullYear(), pmo2=base2.getMonth();

      if(pMode==="month"){
        const canvas=document.getElementById("macro-month-canvas");
        if(!canvas) return;
        const ctx=canvas.getContext("2d");
        const daysInMonth=new Date(pyr2,pmo2+1,0).getDate();
        const labels=[], scores=[];
        for(let i=1;i<=daysInMonth;i++){
          const dk=toKey(new Date(pyr2,pmo2,i));
          if(dk>getTodayKey()) break;
          labels.push(i+"");
          scores.push(macroScoreOf(dk));
        }
        if(window.macroMonthChart) window.macroMonthChart.destroy();
        window.macroMonthChart=new Chart(ctx,{
          type:"line",
          data:{labels,datasets:[{data:scores,borderColor:"#4ade80",backgroundColor:"rgba(74,222,128,0.08)",tension:0.25,fill:true,pointRadius:2}]},
          options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{min:0,max:100,ticks:{color:cssVar("--text3"),font:{size:9}},grid:{color:cssVar("--glass-border")}},x:{ticks:{color:cssVar("--text3"),font:{size:8}},grid:{display:false}}}}
        });
      } else {
        const pyr3=getToday().getFullYear()+window.macroPreviewOffset;
        const yearEl=document.getElementById("macro-year-list");
        if(!yearEl) return;
        let yhtml="";
        MONTHS.forEach(function(m,mi){
          const mdays=new Date(pyr3,mi+1,0).getDate();
          let total=0,count=0;
          for(let d=1;d<=mdays;d++){
            const dk=toKey(new Date(pyr3,mi,d));
            if(dk>getTodayKey()) break;
            total+=macroScoreOf(dk); count++;
          }
          const avg=count?Math.round(total/count):0;
          const isFuture=new Date(pyr3,mi,1)>getToday();
          const mk=pyr3+"-"+String(mi+1).padStart(2,"0");
          const macroRowAttr = isFuture ? "" : "data-macro-monthkey=\""+mk+"\"";
          yhtml+=`<div class="year-row" style="opacity:${isFuture?0.25:1};cursor:${isFuture?"default":"pointer"};border-radius:6px;transition:background 0.15s;" ${macroRowAttr}>
            <div class="year-month">${m}</div>
            <div class="bar-wrap"><div class="bar-fill" style="width:${avg}%;background:${clr(avg)}"></div></div>
            <div class="score-text" style="color:${clr(avg)}">${count?""+avg+"%":"—"}</div>
          </div>`;
        });
        yearEl.innerHTML=yhtml;
      }
    }catch(err){console.error(err);}
  },50);
}


function openTaskDetail(tid){
  taskDetailId=tid;
  taskDetailView="month";
  taskDetailMonthOffset=0;
  taskDetailYearOffset=0;
  const t=tasks.find(t=>t.id===tid);
  if(!t) return;
  document.getElementById("td-task-name").textContent=t.name;
  document.getElementById("view-task-detail").classList.add("open");
  renderTaskDetail();
}

function closeTaskDetail(){
  document.getElementById("view-task-detail").classList.remove("open");
  document.getElementById("view-task-detail").scrollTop=0;
  taskDetailId=null;
}

function renderTaskDetail(){
  const t=tasks.find(t=>t.id===taskDetailId);
  if(!t) return;
  const el=document.getElementById("td-body");
  const todayK=getTodayKey();

  // Compute all-time stats for this task
  const allActive=Object.keys(logs).filter(k=>{
    const log=logs[k]; if(!log||!log.__taskIds) return false;
    const hidden=(log.__hiddenIds)||[];
    if(!log.__taskIds.includes(t.id)||hidden.includes(t.id)) return false;
    if(t.deletedAt&&k>=t.deletedAt) return false;
    return k<=todayK;
  }).sort();
  const allDone=allActive.filter(k=>logs[k][t.id]).length;
  const allRate=allActive.length?Math.round((allDone/allActive.length)*100):0;
  const deleted=!!(t.deletedAt&&t.deletedAt<=todayK);

  let html=`<div class="stat-card" style="margin-bottom:16px">
    <div class="lbl">All-Time Performance</div>
    <div class="stat-avg" style="color:${clr(allRate)}">${allRate}%</div>
    <div class="stat-sub">${allDone} done out of ${allActive.length} active days</div>
    ${deleted?'<div class="stat-sub" style="color:#f87171;margin-top:4px">Task removed on '+t.deletedAt+'</div>':''}
    ${t.createdAt?'<div class="stat-sub" style="margin-top:4px">Created '+t.createdAt+'</div>':''}
  </div>`;

  const isMonth=taskDetailView==="month";
  const canNextM=taskDetailMonthOffset<0;
  const canNextY=taskDetailYearOffset<0;

  // Tab + nav
  if(isMonth){
    const base=new Date(getToday().getFullYear(), getToday().getMonth()+taskDetailMonthOffset, 1);
    const pyr=base.getFullYear(), pmo=base.getMonth();
    const daysInMonth=new Date(pyr,pmo+1,0).getDate();
    const firstDay=new Date(pyr,pmo,1).getDay();

    html+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <button id="td-prev" style="background:none;border:1px solid var(--glass-border);color:var(--text2);padding:5px 13px;font-size:13px;border-radius:4px;cursor:pointer">&#8249;</button>
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
        <div style="display:flex;gap:6px">
          <button id="td-tab-month" class="rtab ${isMonth?"active":""}" style="padding:4px 12px;font-size:9px">Month</button>
          <button id="td-tab-year" class="rtab" style="padding:4px 12px;font-size:9px">Year</button>
        </div>
        <div style="font-size:12px;font-weight:700;color:var(--text)">${MONTHS[pmo]} ${pyr}</div>
      </div>
      <button id="td-next" style="background:none;border:1px solid var(--glass-border);color:${canNextM?"var(--text2)":"var(--glass-border)"};padding:5px 13px;font-size:13px;border-radius:4px;cursor:pointer;pointer-events:${canNextM?"auto":"none"}">&#8250;</button>
    </div>`;

    // Calendar grid
    html+=`<div class="month-grid">`;
    DAYS.forEach(d=>{html+=`<div class="month-day-header">${d}</div>`;});
    html+=`</div><div class="month-grid">`;
    for(let i=0;i<firstDay;i++) html+=`<div></div>`;
    let mDone=0, mActive=0;
    for(let i=1;i<=daysInMonth;i++){
      const k=toKey(new Date(pyr,pmo,i));
      const future=k>todayK;
      const log=logs[k];
      const isT=k===todayK;
      // Check if task was active this day
      let active=false, done=false;
      if(!future&&log&&log.__taskIds){
        const hidden=(log.__hiddenIds)||[];
        active=log.__taskIds.includes(t.id)&&!hidden.includes(t.id)&&(!t.deletedAt||k<t.deletedAt);
        if(active){ mActive++; done=!!log[t.id]; if(done) mDone++; }
      }
      const bg=future?"var(--bg-card)":!active?"var(--bg)":done?"#4ade8025":"#f8717115";
      const dotColor=done?"#4ade80":active?"#f87171":"transparent";
      html+=`<div class="month-cell ${isT?"today":""} ${future?"future":""}" style="background:${bg};border-color:${isT?"rgba(255,255,255,0.25)":"transparent"}">
        <div class="month-cell-num ${isT?"today":""}" style="color:${active?(done?"#4ade80":"#f87171"):"var(--text3)"}">${i}</div>
        ${active?`<div style="width:5px;height:5px;border-radius:50%;background:${dotColor};margin-top:2px"></div>`:""}
      </div>`;
    }
    const mRate=mActive?Math.round((mDone/mActive)*100):0;
    html+=`</div>`;
    html+=`<div class="stat-card"><div class="lbl">${MONTHS[pmo]} ${pyr}</div><div class="stat-avg" style="color:${clr(mRate)}">${mRate}%</div><div class="stat-sub">${mDone}/${mActive} days done</div></div>`;

    // Legend

      <div style="display:flex;align-items:center;gap:6px"><div style="width:10px;height:10px;border-radius:2px;background:#f8717115;border:1px solid #f87171"></div><div style="font-size:10px;color:var(--text3)">Missed</div></div>

    </div>`;

      <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
        <div style="display:flex;gap:6px">
          <button id="td-tab-month" class="rtab" style="padding:4px 12px;font-size:9px">Month</button>
          <button id="td-tab-year" class="rtab active" style="padding:4px 12px;font-size:9px">Year</button>
        </div>
        <div style="font-size:12px;font-weight:700;color:var(--text)">${pyr}</div>
      </div>
      <button id="td-next" style="background:none;border:1px solid var(--glass-border);color:${canNextY?"var(--text2)":"var(--glass-border)"};padding:5px 13px;font-size:13px;border-radius:4px;cursor:pointer;pointer-events:${canNextY?"auto":"none"}">&#8250;</button>
    </div>`;

    let yDone=0, yActive=0;
    MONTHS.forEach((m,mi)=>{
      const mDays=new Date(pyr,mi+1,0).getDate();
      let mD=0, mA=0;
      for(let i=1;i<=mDays;i++){
        const k=toKey(new Date(pyr,mi,i));
        if(k>todayK) break;
        const log=logs[k];
        if(log&&log.__taskIds){
          const hidden=(log.__hiddenIds)||[];
          const active=log.__taskIds.includes(t.id)&&!hidden.includes(t.id)&&(!t.deletedAt||k<t.deletedAt);
          if(active){ mA++; if(log[t.id]) mD++; }
        }
      }
      yDone+=mD; yActive+=mA;
      const rate=mA?Math.round((mD/mA)*100):null;
      const isFuture=new Date(pyr,mi,1)>getToday();
      html+=`<div class="year-row" style="opacity:${isFuture?0.25:1};cursor:${isFuture?"default":"pointer"}" ${!isFuture?'data-td-monthkey="'+pyr+'-'+String(mi+1).padStart(2,'0')+'"':''}>
        <div class="year-month">${m}</div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${rate||0}%;background:${clr(rate||0)}"></div></div>
        <div class="score-text" style="color:${clr(rate||0)}">${rate===null||(isFuture&&mA===0)?"—":rate+"%"}</div>
      </div>`;
    });
    const yRate=yActive?Math.round((yDone/yActive)*100):0;
    html+=`<div class="stat-card"><div class="lbl">${pyr} Summary</div><div class="stat-avg" style="color:${clr(yRate)}">${yRate}%</div><div class="stat-sub">${yDone}/${yActive} days done</div></div>`;

    // Bar chart
    html+=`<div class="chart-wrap" style="margin-top:12px"><div class="chart-title">Monthly Rate — ${pyr}</div><canvas id="td-year-chart" height="120"></canvas></div>`;
  }

  el.innerHTML=html;

  // Wire nav buttons
  document.getElementById("td-tab-month").onclick=()=>{taskDetailView="month";taskDetailMonthOffset=0;renderTaskDetail();};
  document.getElementById("td-tab-year").onclick=()=>{taskDetailView="year";taskDetailYearOffset=0;renderTaskDetail();};
  document.getElementById("td-prev").onclick=()=>{
    if(taskDetailView==="month") taskDetailMonthOffset--;
    else taskDetailYearOffset--;
    renderTaskDetail();
  };
  document.getElementById("td-next").onclick=()=>{
    if(taskDetailView==="month"){if(taskDetailMonthOffset<0){taskDetailMonthOffset++;renderTaskDetail();}}
    else{if(taskDetailYearOffset<0){taskDetailYearOffset++;renderTaskDetail();}}
  };

  // Draw year bar chart
  if(!isMonth){
    setTimeout(()=>{
      const canvas=document.getElementById("td-year-chart");
      if(!canvas||typeof Chart==="undefined") return;
      const pyr=getToday().getFullYear()+taskDetailYearOffset;
      const yearScores=MONTHS.map((_,mi)=>{
        const mDays=new Date(pyr,mi+1,0).getDate();
        let mD=0, mA=0;
        for(let i=1;i<=mDays;i++){
          const k=toKey(new Date(pyr,mi,i));
          if(k>todayK) break;
          const log=logs[k];
          if(log&&log.__taskIds){
            const hidden=(log.__hiddenIds)||[];
            const active=log.__taskIds.includes(t.id)&&!hidden.includes(t.id)&&(!t.deletedAt||k<t.deletedAt);
            if(active){ mA++; if(log[t.id]) mD++; }
          }
        }
        return mA?Math.round((mD/mA)*100):0;
      });
      if(window._tdYearChart) window._tdYearChart.destroy();
      window._tdYearChart=new Chart(canvas.getContext("2d"),{
        type:"bar",
        data:{labels:MONTHS,datasets:[{data:yearScores,backgroundColor:yearScores.map(v=>clr(v)+"aa"),borderColor:yearScores.map(v=>clr(v)),borderWidth:1,borderRadius:4}]},
        options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{min:0,max:100,ticks:{color:cssVar("--text3"),font:{size:9}},grid:{color:cssVar("--glass-border")}},x:{ticks:{color:cssVar("--text3"),font:{size:8}},grid:{display:false}}}}
      });
    },50);
  }
}

function calcStreak(){
  let cur=0, best=0, tmp=0;
  const d=new Date(getToday());
  for(let i=0;i<365;i++){
    const k=toKey(d);
    if(scoreOf(logs[k],k)>0){ cur++; d.setDate(d.getDate()-1); }
    else break;
  }
  const allKeys=Object.keys(logs).sort();
  tmp=0;
  allKeys.forEach(k=>{ if(scoreOf(logs[k],k)>0){tmp++;best=Math.max(best,tmp);}else{tmp=0;} });
  return {cur, best};
}

function exportReportImage(){
  const reportEl = document.getElementById("view-analytics");
  if(typeof html2canvas !== "undefined"){
    html2canvas(reportEl, {
      backgroundColor: "var(--bg)",
      scale: 3,
      useCORS: true,
      logging: false,
    }).then(canvas => {
      const a = document.createElement("a");
      a.download = "tracker-report-"+reportPeriod+".png";
      a.href = canvas.toDataURL("image/png");
      a.click();
    });
  } else {
    const bc = document.getElementById("bar-chart");
    const pc = document.getElementById("pie-chart");
    const scale = 3;
    const w = 420*scale, padding = 20*scale;
    const bh = bc ? bc.height*scale : 0;
    const ph = pc ? pc.height*scale : 0;
    const headerH = 80*scale;
    const summaryH = 160*scale;
    const totalH = headerH + bh + 20*scale + ph + 20*scale + summaryH;
    const out = document.createElement("canvas");
    out.width = w; out.height = totalH;
    const ctx = out.getContext("2d");
    const bg = document.documentElement.style.getPropertyValue("--bg")||"#0a0a0a";
    const fg = document.documentElement.style.getPropertyValue("--text")||"#e8e8e8";
    const muted = "#555555";
    ctx.fillStyle = bg; ctx.fillRect(0,0,w,totalH);
    ctx.fillStyle = fg; ctx.font = `bold ${16*scale}px monospace`;
    ctx.fillText("RECOVERY MODE TRACKER", padding, 36*scale);
    ctx.font = `${10*scale}px monospace`; ctx.fillStyle = muted;
    ctx.fillText(reportTitle()+" · "+getToday().toLocaleDateString("en-IN"), padding, 54*scale);
    if(bc){ ctx.drawImage(bc, 0, 0, bc.width, bc.height, padding, headerH, w-padding*2, bh); }
    if(pc){ ctx.drawImage(pc, 0, 0, pc.width, pc.height, padding, headerH+bh+20*scale, w-padding*2, ph); }
    
    const sy = headerH+bh+ph+50*scale;
    const _fd=getReportData();
    const pieData = getPieData();
    const valid = _fd.scores.filter(s=>s!==null);
    const avg = valid.length?Math.round(valid.reduce((a,b)=>a+b,0)/valid.length):0;
    ctx.fillStyle = fg; ctx.font = `${13*scale}px monospace`;
    ctx.fillText("Average: "+avg+"%", padding, sy);
    ctx.fillStyle="#4ade80"; ctx.font=`${11*scale}px monospace`;
    ctx.fillText("Strong: "+pieData.strong, padding, sy+20*scale);
    ctx.fillStyle="#facc15"; ctx.fillText("Partial: "+pieData.partial, padding, sy+36*scale);
    ctx.fillStyle="#f87171"; ctx.fillText("Weak: "+pieData.weak, padding, sy+52*scale);
    ctx.fillStyle=muted; ctx.fillText("Missed: "+pieData.zero, padding, sy+68*scale);
    const a = document.createElement("a");
    a.download="tracker-report.png"; a.href=out.toDataURL("image/png"); a.click();
  }
}

(function initTodaySnapshot(){

function saveTasksImage(){
  haptic("medium");
  var ak=viewingKey||getTodayKey();

  // Temporarily ensure header is visible for screenshot
  var header=document.getElementById("header");
  var wasCollapsed=(typeof headerCollapsed!=="undefined")?headerCollapsed:false;
  if(wasCollapsed){
    header.classList.remove("collapsed");
    header.style.transform="";
    header.style.opacity="1";
  }

  // Scroll to top so full view is captured
  window.scrollTo(0,0);

  var el=document.getElementById("app")||document.body;

  // Small delay to let any layout settle
  setTimeout(function(){
    if(typeof html2canvas==="undefined"){
      // Fallback if html2canvas not loaded
      showImportStatus("Screenshot library not ready","#f87171");
      return;
    }
    var bgColor=getComputedStyle(document.documentElement).getPropertyValue("--bg").trim()||"#0d0d0d";

    // Capture header + full scrollable today view — not just viewport
    var headerEl=document.getElementById("header");
    var navEl=document.getElementById("nav");
    var bodyEl=document.getElementById("view-today");

    // Build off-screen container with real layout — no fixed positioning
    var snap=document.createElement("div");
    snap.style.cssText="position:absolute;left:-9999px;top:0;width:"+window.innerWidth+"px;background:"+bgColor+";";
    document.body.appendChild(snap);

    function snapClone(src, extra){
      if(!src) return;
      var cl=src.cloneNode(true);
      cl.style.position="relative";
      cl.style.top=cl.style.left=cl.style.right=cl.style.bottom="auto";
      cl.style.width="100%"; cl.style.boxSizing="border-box";
      cl.style.backdropFilter=cl.style.webkitBackdropFilter="none";
      cl.style.zIndex="auto"; cl.style.maxHeight="none"; cl.style.overflow="visible";
      if(extra) Object.assign(cl.style,extra);
      // Remove hidden class from any nested collapsed elements
      cl.classList.remove("hidden","collapsed");
      snap.appendChild(cl);
    }

    // Always include header (even if collapsed)
    snapClone(headerEl,{opacity:"1",transform:"none"});
    snapClone(navEl);
    // Full body — no height/overflow restriction so ALL tasks show

function parseFlexDate(raw){
  if(!raw)return null;var s=String(raw).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  if(/^\d{5}$/.test(s)){var d=new Date(Math.round((+s-25569)*86400*1000));if(!isNaN(d))return toKey(d);}
  var dmy=s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);
  if(dmy)return dmy[3]+"-"+dmy[2].padStart(2,"0")+"-"+dmy[1].padStart(2,"0");
  var mdy=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(mdy)return mdy[3]+"-"+mdy[1].padStart(2,"0")+"-"+mdy[2].padStart(2,"0");
  var months={jan:"01",feb:"02",mar:"03",apr:"04",may:"05",jun:"06",jul:"07",aug:"08",sep:"09",oct:"10",nov:"11",dec:"12"};
  var dmy2=s.match(/^(\d{1,2})[\s\-\/]([a-zA-Z]+)[\s\-\/](\d{4})$/);
  if(dmy2){var m=months[dmy2[2].slice(0,3).toLowerCase()];if(m)return dmy2[3]+"-"+m+"-"+dmy2[1].padStart(2,"0");}
  var nd=new Date(s);if(!isNaN(nd)&&nd.getFullYear()>2000)return toKey(nd);
  return null;
}
