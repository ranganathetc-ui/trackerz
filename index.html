function importFromExcel(file){
  if(typeof XLSX==="undefined"){ showImportStatus("SheetJS not loaded. Try again.","#f87171"); return; }
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array",cellDates:true});

      // Find the data sheet — accept "Manual Import-Export Tracker" or first sheet with date/task_name/status columns
      let targetSheet=null;
      const preferredName="Manual Import-Export Tracker";
      if(wb.Sheets[preferredName]) targetSheet=wb.Sheets[preferredName];
      else {
        // Try to find any sheet containing date/task data
        for(const sname of wb.SheetNames){
          const s=wb.Sheets[sname];
          const rows=XLSX.utils.sheet_to_json(s,{header:1,defval:""});
          // Check if it has at least 3 cols and some row looks like data
          const hasData=rows.some(r=>r.length>=3&&parseFlexDate(String(r[0]).trim())!==null);
          if(hasData){targetSheet=s;break;}
        }
      }
      if(!targetSheet){
        showImportStatus("No valid data sheet found. Make sure your file has date, task_name, status columns.","#f87171");
        return;
      }

      const rawRows=XLSX.utils.sheet_to_json(targetSheet,{header:1,defval:""});

      // Detect column layout — exported format has 4 cols (date,task_id,task_name,status)
      // Simple format has 3 cols (date,task_name,status)
      // Auto-detect by checking header row or first data row
      let colDate=0, colTaskId=-1, colTaskName=1, colStatus=2;
      // Check for header row
      const firstRow=rawRows.find(r=>r&&r.length>=2&&String(r[0]).trim()!=="");
      if(firstRow){
        const h=firstRow.map(c=>String(c).trim().toLowerCase());
        const hi_date=h.findIndex(c=>c==="date");
        const hi_tid=h.findIndex(c=>c==="task_id");
        const hi_tname=h.findIndex(c=>c==="task_name"||c==="name");
        const hi_status=h.findIndex(c=>c==="status"||c==="done"||c==="completion");
        if(hi_date>=0) colDate=hi_date;
        if(hi_tid>=0) colTaskId=hi_tid;
        if(hi_tname>=0) colTaskName=hi_tname;
        if(hi_status>=0) colStatus=hi_status;
      }

      const validRows=[];
      // Build task name→id map for deduplication
      const nameToId={};
      tasks.forEach(t=>{ nameToId[t.name.toLowerCase()]=t.id; });

      rawRows.forEach(row=>{
        if(!row||row.length<2) return;
        const rawDate=String(row[colDate]||"").trim();
        if(!rawDate||rawDate==="date"||rawDate.startsWith("[")||rawDate.startsWith("-")||rawDate==="") return;
        const k=parseFlexDate(rawDate);
        if(!k) return; // skip rows where date can't be parsed

        const rawName=String(row[colTaskName]||"").trim();
        if(!rawName||rawName==="task_name"||rawName==="name") return;

        const rawStatus=String(row[colStatus]||"").trim().toLowerCase();
        // Skip decoration/header rows
        if(rawDate.startsWith("---")||rawName.startsWith("---")) return;

        // Resolve task id — use existing task by name first, then generate stable hash
        let tid="";
        if(colTaskId>=0 && row[colTaskId]) tid=String(row[colTaskId]).trim();
        if(!tid){
          // Match by name (case-insensitive) against existing tasks
          const existing=nameToId[rawName.toLowerCase()];
          if(existing) tid=existing;
          else {
            // Generate stable deterministic ID from task name
            let hash=0;
            for(let ci=0;ci<rawName.length;ci++) hash=((hash<<5)-hash)+rawName.charCodeAt(ci);
            tid="t"+Math.abs(hash);
          }
        }

        const isDone=rawStatus==="done"||rawStatus==="yes"||rawStatus==="true"||rawStatus==="1"||rawStatus==="complete"||rawStatus==="completed";

        validRows.push({date:k, task_id:tid, task_name:rawName, done:isDone});
        // Register in nameToId for future rows
        if(!nameToId[rawName.toLowerCase()]) nameToId[rawName.toLowerCase()]=tid;
      });

      if(validRows.length===0){
        showImportStatus("No valid rows found. Columns needed: date, task_name, status.","#f87171");
        return;
      }

      // Optionally load task definitions from Tasks Definition sheet
      const taskMetaSheet=wb.Sheets["Tasks Definition"];
      if(taskMetaSheet){
        const taskMetaRows=XLSX.utils.sheet_to_json(taskMetaSheet,{header:1,defval:""});
        const extractedTasks=[];
        taskMetaRows.forEach(row=>{
          if(!row||row.length<2) return;
          const id=String(row[0]).trim();
          if(!id||id==="id"||id.startsWith("[")||id.startsWith("-")) return;
          extractedTasks.push({id,name:String(row[1]).trim(),time:String(row[2]||"").trim(),
            createdAt:String(row[3]||"").trim()||undefined,deletedAt:String(row[4]||"").trim()||undefined});
        });
        if(extractedTasks.length>0) tasks=extractedTasks;
      } else {
        // Build tasks list from validRows if no Tasks Definition sheet
        const seenIds={};
        validRows.forEach(r=>{
          if(!seenIds[r.task_id]){
            seenIds[r.task_id]=true;
            const existing=tasks.find(t=>t.id===r.task_id);
            if(!existing) tasks.push({id:r.task_id,name:r.task_name,createdAt:r.date});
          }
        });
      }

      // Rebuild logs — merge with existing so we don't wipe macro data
      const newLogs={};
      // Preserve existing macro and meta data
      Object.keys(logs).forEach(k=>{
        const old=logs[k];
        if(old.__macros||old.__hiddenIds) newLogs[k]=Object.assign({},old,{__taskIds:old.__taskIds||[]});
      });

      validRows.forEach(r=>{
        if(!newLogs[r.date]) newLogs[r.date]={__taskIds:[]};
        newLogs[r.date][r.task_id]=r.done;
        if(!newLogs[r.date].__taskIds.includes(r.task_id)) newLogs[r.date].__taskIds.push(r.task_id);
      });

      logs=newLogs;
      const todayK=getTodayKey();
      const snap=tasks.filter(t=>(!t.createdAt||t.createdAt<=todayK)&&(!t.deletedAt||t.deletedAt>todayK)).map(t=>t.id);
      if(!logs[todayK]) logs[todayK]={__taskIds:snap};
      else if(!logs[todayK].__taskIds) logs[todayK].__taskIds=snap;

      persist();
      showImportStatus("Imported "+validRows.length+" records from "+Object.keys(newLogs).length+" days. Reloading...","#4ade80");
      setTimeout(()=>navigateTo("today"),800);
    }catch(err){
      showImportStatus("Import error: "+err.message,"#f87171");
    }
  };
  reader.onerror=function(){ showImportStatus("Could not read file.","#f87171"); };
  reader.readAsArrayBuffer(file);
}

// ── MACRO DATE PARSER: accepts every common format ──────────────────────────
function parseMacroDate(raw){
  if(!raw && raw!==0) return null;
  // Native Date object (from cellDates:true)
  if(raw instanceof Date){ if(!isNaN(raw)) return toKey(raw); return null; }
  var s=String(raw).trim();
  if(!s) return null;
  var MO={jan:"01",feb:"02",mar:"03",apr:"04",may:"05",jun:"06",jul:"07",aug:"08",sep:"09",oct:"10",nov:"11",dec:"12"};
  // YYYY-MM-DD
  var m; if((m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/))) return m[1]+"-"+m[2]+"-"+m[3];
  // YYYY/MM/DD or YYYY.MM.DD
  if((m=s.match(/^(\d{4})[\/\.](\d{1,2})[\/\.](\d{1,2})$/))) return m[1]+"-"+m[2].padStart(2,"0")+"-"+m[3].padStart(2,"0");
  // DD/MM/YYYY or DD-MM-YYYY or DD.MM.YYYY
  if((m=s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/))) return m[3]+"-"+m[2].padStart(2,"0")+"-"+m[1].padStart(2,"0");
  // D MMM YYYY or D-MMM-YYYY (23 May 2026 / 23-May-2026)
  if((m=s.match(/^(\d{1,2})[\s\-\/]([A-Za-z]+)[\s\-\/](\d{4})$/))){var mo=MO[m[2].slice(0,3).toLowerCase()];if(mo)return m[3]+"-"+mo+"-"+m[1].padStart(2,"0");}
  // MMM D YYYY or MMM D, YYYY (May 23 2026 / May 23, 2026)
  if((m=s.match(/^([A-Za-z]+)\s+(\d{1,2}),?\s+(\d{4})$/))){var mo2=MO[m[1].slice(0,3).toLowerCase()];if(mo2)return m[3]+"-"+mo2+"-"+m[2].padStart(2,"0");}
  // Excel serial number 5-digit
  if((m=s.match(/^\d{5}$/))){var d=new Date(Math.round((+s-25569)*86400*1000));if(!isNaN(d))return toKey(d);}
  // JS Date fallback
  var nd=new Date(s); if(!isNaN(nd)&&nd.getFullYear()>2000) return toKey(nd);
  return null;
}

// ── MACRO STATUS PARSER ───────────────────────────────────────────────────────
function parseMacroStatus(val){
  if(val===true||val===1) return true;
  var s=String(val||"").trim().toLowerCase();
  return s==="done"||s==="yes"||s==="1"||s==="true"||s==="complete"||s==="completed"||s==="✓"||s==="✔";
}

// ── SMART COLUMN DETECTOR ─────────────────────────────────────────────────────
// Scans first N data rows to figure out which column index is date / name / status
// Works even when headers are missing, renamed, or in a different order
function detectMacroColumns(allRows){
  if(!allRows||!allRows.length) return null;
  var headerRow=allRows[0];
  var numCols=headerRow.length;
  var scores={date:new Array(numCols).fill(0), name:new Array(numCols).fill(0), status:new Array(numCols).fill(0)};

  // First: check header row for known keywords
  var DATE_WORDS=["date","day","dt","fecha","datum"];
  var NAME_WORDS=["macro","task","name","title","item","activity","habit","todo"];
  var STATUS_WORDS=["status","done","complete","finished","result","state"];
  headerRow.forEach(function(cell,i){
    var h=String(cell||"").trim().toLowerCase();
    if(DATE_WORDS.some(function(w){return h.indexOf(w)>=0;})) scores.date[i]+=20;
    if(NAME_WORDS.some(function(w){return h.indexOf(w)>=0;})) scores.name[i]+=20;
    if(STATUS_WORDS.some(function(w){return h.indexOf(w)>=0;})) scores.status[i]+=20;
  });

  // Then: scan up to 10 data rows and score by value patterns
  var dataRows=allRows.slice(1,Math.min(allRows.length,11));
  // If first row looks like data too (no header), include it
  var firstLooksLikeData=headerRow.some(function(c){return parseMacroDate(c)!==null;});
  if(firstLooksLikeData) dataRows=allRows.slice(0,Math.min(allRows.length,10));

  dataRows.forEach(function(row){
    row.forEach(function(cell,i){
      if(i>=numCols) return;
      var s=String(cell||"").trim().toLowerCase();
      if(parseMacroDate(cell)!==null) scores.date[i]+=3;
      if(s==="done"||s==="undone"||s==="yes"||s==="no"||s==="complete"||s==="true"||s==="false") scores.status[i]+=3;
      // Long text (5-60 chars, not a date, not a status word) → likely task name
      if(s.length>=3&&s.length<=80&&parseMacroDate(cell)===null&&s!=="done"&&s!=="undone"&&s!=="yes"&&s!=="no") scores.name[i]+=2;
    });
  });

  // Pick best column index for each role (they must all be different)
  function bestCol(scoreArr, exclude){
    var best=-1, bestScore=-1;
    scoreArr.forEach(function(sc,i){if(exclude.indexOf(i)<0&&sc>bestScore){bestScore=sc;best=i;}});
    return best;
  }
  var dateCol=bestCol(scores.date,[]);
  var statusCol=bestCol(scores.status,[dateCol]);
  var nameCol=bestCol(scores.name,[dateCol,statusCol]);
  // If no name col found pick any remaining
  if(nameCol<0){for(var i=0;i<numCols;i++){if(i!==dateCol&&i!==statusCol){nameCol=i;break;}}}
  return {dateCol:dateCol, nameCol:nameCol, statusCol:statusCol, hasHeader:!firstLooksLikeData};
}

// ── MAIN IMPORT FUNCTION ──────────────────────────────────────────────────────
function importMacrosFromExcel(file){
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      if(typeof XLSX==="undefined"){showImportStatus("XLSX library not loaded.","#f87171");return;}
      var wb=XLSX.read(new Uint8Array(ev.target.result),{type:"array",cellDates:true,raw:false});

      // Pick best sheet: prefer "Macros Log", else scan for one with date+task data
      var wsName=null;
      if(wb.Sheets["Macros Log"]) wsName="Macros Log";
      if(!wsName) wb.SheetNames.forEach(function(sn){if(!wsName){
        var rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:"",raw:false});
        if(rows.length>1) wsName=sn;
      }});
      if(!wsName) wsName=wb.SheetNames[0];

      var ws=wb.Sheets[wsName];
      // Read as raw 2D array (no header parsing) — we detect columns ourselves
      var allRows=XLSX.utils.sheet_to_json(ws,{header:1,defval:"",raw:false});
      // Remove completely empty rows
      allRows=allRows.filter(function(r){return r.some(function(c){return String(c||"").trim()!=="";});});
      if(!allRows.length){showImportStatus("Sheet is empty.","#f87171");return;}

      var cols=detectMacroColumns(allRows);
      if(!cols||cols.nameCol<0){showImportStatus("Could not detect task name column.","#f87171");return;}

      // Determine data start row (skip header if detected)
      var startRow=cols.hasHeader?1:0;
      var imported=0, updated=0, skipped=0;

      for(var ri=startRow;ri<allRows.length;ri++){
        var row=allRows[ri];
        var dateRaw=cols.dateCol>=0?row[cols.dateCol]:"";
        var taskName=String(row[cols.nameCol]||"").trim();
        var statusRaw=cols.statusCol>=0?row[cols.statusCol]:"";

        // Skip blank rows, header-like rows, comment rows
        if(!taskName) continue;
        var tl=taskName.toLowerCase();
        if(tl==="macro_name"||tl==="task_name"||tl==="task"||tl==="name"||tl==="---"||tl.indexOf("how to")===0||tl.indexOf("fill")===0||tl.indexOf("edit")===0) continue;

        var dk=cols.dateCol>=0?parseMacroDate(dateRaw):null;
        if(!dk){skipped++;continue;}

        var isDone=parseMacroStatus(statusRaw);
        var log=logs[dk]||{};
        var dayTasks=Array.isArray(log.__macroTasks)?log.__macroTasks.slice():[];
        var md=Object.assign({},log.__macros||{});
        var existing=dayTasks.find(function(t){return t.name.toLowerCase()===taskName.toLowerCase();});
        if(existing){
          md[existing.id]=isDone;
          logs[dk]=Object.assign({},log,{__macroTasks:dayTasks,__macros:md});
          updated++;
        } else {
          var nid="m"+Date.now()+"-"+Math.random().toString(36).slice(2,7);
          dayTasks.push({id:nid,name:taskName});
          md[nid]=isDone;
          logs[dk]=Object.assign({},log,{__macroTasks:dayTasks,__macros:md});
          imported++;
        }
      }
      persist();
      renderMacros();
      if(imported===0&&updated===0&&skipped===0){
        showImportStatus("Nothing imported — check your file has date + task columns.","#f87171");
      } else {
        var msg="Macros: "+imported+" added"+(updated?", "+updated+" updated":"")+(skipped?", "+skipped+" skipped":"");
        showImportStatus(msg,"#a78bfa");
      }
    }catch(err){
      showImportStatus("Import failed: "+err.message,"#f87171");
      console.error("Macro import error:",err);
    }
  };
  reader.onerror=function(){showImportStatus("Could not read file.","#f87171");};
  reader.readAsArrayBuffer(file);
}

function exportMacrosToExcel(){
  if(typeof XLSX==="undefined"){showImportStatus("XLSX not loaded.","#f87171");return;}
  var allKeys=Object.keys(logs).filter(function(k){
    return logs[k]&&Array.isArray(logs[k].__macroTasks)&&logs[k].__macroTasks.length>0;
  }).sort();
  if(allKeys.length===0){showImportStatus("No macro data to export.","#f87171");return;}
  var rows=[["date","macro_name","status"]];
  allKeys.forEach(function(dk){
    var log=logs[dk]||{};
    var dayTasks=log.__macroTasks||[];
    var md=log.__macros||{};
    dayTasks.forEach(function(m){
      rows.push([dk, m.name, md[m.id]?"Done":"Undone"]);
    });
  });
  var wb=XLSX.utils.book_new();
  var ws=XLSX.utils.aoa_to_sheet(rows);
  ws["!cols"]=[{wch:14},{wch:34},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws,"Macros Log");
  XLSX.writeFile(wb,"macros-export-"+getTodayKey()+".xlsx");
  showImportStatus("Macros exported — "+( rows.length-1)+" tasks.","#a78bfa");
}

function masterEraseAllData(){
  var confirmed=confirm("⚠️ ERASE ALL DATA?\n\nThis will permanently delete all tasks, all logs, all macro data, and your name.\n\nThis cannot be undone. Continue?");
  if(!confirmed)return;
  var confirmed2=confirm("Are you absolutely sure? All your tracking history will be gone forever.");
  if(!confirmed2)return;
  tasks=[];logs={};macros=[];userName="";
  localStorage.removeItem("rm_tasks");
  localStorage.removeItem("rm_logs");
  localStorage.removeItem("rm_username");
  localStorage.removeItem("rm_macros");
  persist();
  render();
  showImportStatus("All data erased. Fresh start!","#f87171");
}

function showImportStatus(msg,color){
  const toast=document.getElementById("import-toast");
  if(!toast) return;
  toast.textContent=msg;
  toast.style.color=color;
  toast.style.borderColor=color;
  toast.style.display="block";
  clearTimeout(toast._timer);
  if(color==="#4ade80"){
    toast._timer=setTimeout(()=>{ toast.style.display="none"; },4000);
  }
}

function navigateTo(view, targetOffset){
  const allViews=["today","week","month","year","streak","macros","analytics","settings"];
  currentView=(view==="tasks")?"today":view;
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.toggle("active",b.dataset.view===view||(view==="tasks"&&b.dataset.view==="tasks")));
  allViews.forEach(v=>{
    const el=document.getElementById("view-"+v);
    if(el) el.classList.toggle("hidden",v!==currentView);
  });
  render();
}

    // Assign task to group via select (handled in change event)

        if(k>=ak&&logs[k]&&logs[k].__taskIds&&!logs[k].__taskIds.includes(newId))
          logs[k].__taskIds=[...logs[k].__taskIds,newId];
      });
      const _al=logs[ak]||{};

      } else if(!logs[ak].__taskIds.includes(newId)){
        logs[ak].__taskIds=[...logs[ak].__taskIds,newId];
      }

      }

      // Update header score bar without full render
      const vt=visibleTasksForDay(updated,ak);

      const grpHeader=rowEl?.closest("[data-grp-id]")?.previousElementSibling;

      persist();
      setTimeout(()=>checkAllTasksDone(ak), 320);
      return;
    }
    const editBtn=e.target.closest("[data-edit]");
    if(editBtn&&editMode){ editId=editBtn.dataset.edit; render(); return; }
    if(e.target.id==="save-edit-btn"){

      const time=document.getElementById("edit-time-inp").value.trim();
      if(!name) return;

      editId=null; persist(); render(); return;
    }
    const delBtn=e.target.closest("[data-del]");
    if(delBtn&&editMode){
      const ak=viewingKey||getTodayKey();
      const isLive=ak===getTodayKey();
      const delId=delBtn.dataset.del;
      if(isLive){
        tasks=tasks.map(t=>t.id===delId?Object.assign({},t,{deletedAt:ak}):t);
        Object.keys(logs).forEach(k=>{
          if(k>=ak&&logs[k]&&logs[k].__taskIds)
            logs[k].__taskIds=logs[k].__taskIds.filter(id=>id!==delId);
        });
      } else {
        const day=logs[ak]||{};
        const hidden=[...(day.__hiddenIds||[])];
        if(!hidden.includes(delId)) hidden.push(delId);
        const snap=[...(day.__taskIds||tasks.map(t=>t.id))].filter(id=>id!==delId);
        logs[ak]=Object.assign({},day,{__hiddenIds:hidden,__taskIds:snap});
      }
      persist(); render(); return;

  });

(function(){
  let vsy=0, vsx=0, vdragging=false;
  const THRESHOLD = 40; // px needed to trigger
  const ZONE_W = 0.6;   // only centre 60% of screen width

  document.addEventListener("touchstart", function(e){
    const t=e.touches[0];
    const cx=window.innerWidth/2;
    const zw=window.innerWidth*ZONE_W/2;
    // Only trigger in centre zone
    if(t.clientX < cx-zw || t.clientX > cx+zw) return;
    vsy=t.clientY; vsx=t.clientX; vdragging=true;
  },{passive:true});

  document.addEventListener("touchmove", function(e){
    if(!vdragging) return;
    const dy=e.touches[0].clientY - vsy;
    const dx=e.touches[0].clientX - vsx;
    // Cancel if mostly horizontal
    if(Math.abs(dx) > Math.abs(dy)){vdragging=false; return;}
  },{passive:true});

  document.addEventListener("touchend", function(e){
    if(!vdragging) return;
    vdragging=false;
    const dy=e.changedTouches[0].clientY - vsy;
    const dx=e.changedTouches[0].clientX - vsx;
    if(Math.abs(dx) > Math.abs(dy)*1.5) return; // too horizontal
    if(dy > THRESHOLD && headerCollapsed){
      // Swipe DOWN → show header
      setHeaderCollapsed(false);
    } else if(dy < -THRESHOLD && !headerCollapsed){
      // Swipe UP → hide header
      setHeaderCollapsed(true);
    }
  },{passive:true});
})();

(function(){
  const TOP=['tasks','streak','macros','analytics','settings'];
  const SUB=[];
  const EASE='cubic-bezier(0.32,0.72,0,1)'; // iOS-like deceleration
  const DUR=340;
  let busy=false;

  // Wrap all views in a clip container so slides don't overflow
  const app=document.getElementById('app');
  app.style.overflow='hidden';
  app.style.position='relative';

  function slide(fromEl, toEl, dir, done){
    if(!fromEl||!toEl||fromEl===toEl){if(done)done();return;}
    const W=window.innerWidth||390;
    busy=true;

    // Position toEl off-screen instantly
    toEl.style.transition='none';
    toEl.style.transform='translateX('+(dir>0?W:-W)+'px)';
    toEl.style.willChange='transform,filter';
    fromEl.style.willChange='transform,filter';
    toEl.offsetHeight; // force reflow

    // Animate both simultaneously
    const t=`transform ${DUR}ms ${EASE}, filter ${DUR}ms ease`;
    fromEl.style.transition=t;
    toEl.style.transition=t;

    fromEl.style.transform='translateX('+(dir>0?-W:W)+'px)';
    fromEl.style.filter='blur(6px)';
    toEl.style.transform='translateX(0)';
    toEl.style.filter='blur(0px)';

    function cleanup(){
      fromEl.style.transition='';
      fromEl.style.transform='';
      fromEl.style.filter='';
      fromEl.style.willChange='';
      toEl.style.transition='';
      toEl.style.filter='';
      toEl.style.willChange='';
      busy=false;
      if(done)done();
    }
    toEl.addEventListener('transitionend',function h(e){
      if(e.propertyName!=='transform')return;
      toEl.removeEventListener('transitionend',h);
      cleanup();
    },{once:true});
    // Fallback
    setTimeout(cleanup, DUR+60);
  }

  const _orig=navigateTo;
  window.navigateTo=function(view,offset){
    if(busy){_orig(view,offset);return;}
    const prev=currentView;
    const prevTopI=TOP.indexOf(SUB.includes(prev)?'tasks':prev);
    const newTopI =TOP.indexOf(SUB.includes(view)?'tasks':view);
    const prevSubI=SUB.indexOf(prev), newSubI=SUB.indexOf(view);
    let dir=null;
    if(prevTopI>=0&&newTopI>=0&&prevTopI!==newTopI) dir=newTopI>prevTopI?1:-1;
    else if(prevSubI>=0&&newSubI>=0&&prevSubI!==newSubI) dir=newSubI>prevSubI?1:-1;
    const fromEl=document.getElementById('view-'+prev);
    _orig(view,offset);
    const toEl=document.getElementById('view-'+currentView);

    if(!el)return;

      sy=e.touches[0].clientY;

      if(!dragging)return;
      const dx=e.touches[0].clientX-sx;

      e.preventDefault();

      const activeEl=document.getElementById('view-'+currentView);
      if(activeEl&&el===document.documentElement){
        activeEl.style.transform='translateX('+dx*0.35+'px)';
        activeEl.style.filter='blur('+(pct*2)+'px)';

      if(!dragging)return;
      dragging=false;

      const activeReset=document.getElementById('view-'+currentView);
      const resetEl=(el===document.documentElement&&activeReset)?activeReset:el;
      resetEl.style.transition=`transform 280ms ${EASE}, filter 280ms ease`;
      resetEl.style.transform='translateX(0)';
      resetEl.style.filter='blur(0px)';
      resetEl.addEventListener('transitionend',function h(){

      },{once:true});

      dragging=false;
      const cancelEl=(el===document.documentElement)?document.getElementById('view-'+currentView)||el:el;
      cancelEl.style.transition=`transform 200ms ${EASE}`;
      cancelEl.style.transform='translateX(0)';
      cancelEl.style.filter='';
      cancelEl.addEventListener('transitionend',function h(){cancelEl.removeEventListener('transitionend',h);cancelEl.style.transition='';},{once:true});
    },{passive:true});
  }

  // ── Single document-level swipe — works on entire screen including empty areas ──
  function getSwipeTarget(dir){
    const cur=currentView==="today"?"tasks":currentView;
    const i=TOP.indexOf(cur);
    if(dir==="left"&&i<TOP.length-1) return TOP[i+1];
    if(dir==="right"&&i>0) return TOP[i-1];
    return null;
  }
  addSwipe(document.documentElement, getSwipeTarget);

  // Task detail — slide in from right, swipe right to close
  (function(){
    const el=document.getElementById('view-task-detail');
    if(!el)return;
    let sx=0,sy=0,dragging=false,moved=false,lastDx=0;

    // Override openTaskDetail to use slide-in
    const _openOrig=window.openTaskDetail;
    if(_openOrig) window.openTaskDetail=function(id){
      _openOrig(id);
      const W=window.innerWidth||390;
      el.style.transition='none';
      el.style.transform='translateX('+W+'px)';
      el.offsetHeight;
      el.style.transition=`transform ${DUR}ms ${EASE}, filter ${DUR}ms ease`;
      el.style.transform='translateX(0)';
      el.style.filter='blur(0)';
    };

    el.addEventListener('touchstart',e=>{
      sx=e.touches[0].clientX; sy=e.touches[0].clientY;
      dragging=true; moved=false; lastDx=0;
    },{passive:true});
    el.addEventListener('touchmove',e=>{
      if(!dragging)return;
      const dx=e.touches[0].clientX-sx;
      const dy=e.touches[0].clientY-sy;
      if(!moved){if(Math.abs(dy)>Math.abs(dx)||dx<0){dragging=false;return;}moved=true;}
      lastDx=dx;
      if(dx>0){
        el.style.transform='translateX('+(dx*0.5)+'px)';
        el.style.filter='blur('+(Math.min(dx/window.innerWidth,1)*3)+'px)';
      }
    },{passive:true});
    el.addEventListener('touchend',e=>{
      if(!dragging)return; dragging=false;
      const dx=lastDx;
      if(dx>70){
        const W=window.innerWidth||390;
        el.style.transition=`transform ${DUR}ms ${EASE}, filter ${DUR}ms ease`;
        el.style.transform='translateX('+W+'px)';
        el.style.filter='blur(8px)';
        el.addEventListener('transitionend',function h(){
          el.removeEventListener('transitionend',h);
          el.style.transition=''; el.style.filter='';
          closeTaskDetail();
        },{once:true});
      } else {
        el.style.transition=`transform 260ms ${EASE}, filter 260ms ease`;
        el.style.transform='translateX(0)'; el.style.filter='blur(0)';
        el.addEventListener('transitionend',function h(){el.removeEventListener('transitionend',h);el.style.transition='';},{once:true});
      }
    },{passive:true});
  })();
})();

// ── DAILY REMINDER ───────────────────────────────────────────────────────────
var _reminderTimer=null;
function scheduleReminder(){
  if(_reminderTimer){clearTimeout(_reminderTimer);_reminderTimer=null;}
  if(!reminderEnabled||!reminderTime||!('Notification' in window)||Notification.permission!=='granted') return;
  var now=new Date();
  var parts=reminderTime.split(':');
  var target=new Date(now.getFullYear(),now.getMonth(),now.getDate(),parseInt(parts[0]),parseInt(parts[1]),0);
  if(target<=now) target.setDate(target.getDate()+1);
  var ms=target-now;
  _reminderTimer=setTimeout(function(){
    new Notification("Tracker Z",{body:"Time to log your tasks for today.",icon:""});
    scheduleReminder(); // reschedule for tomorrow
  },ms);
}
scheduleReminder();

// ── LONG-PRESS QUICK STATS ───────────────────────────────────────────────────
(function(){
  var _lpt=null,_lpTarget=null;
  document.addEventListener("touchstart",function(e){
    const row=e.target.closest(".task-row-tappable");
    if(!row) return;
    _lpTarget=row;
    _lpt=setTimeout(function(){
      const tid=row.dataset.toggle;
      if(!tid) return;
      const task=tasks.find(t=>t.id===tid);
      if(!task) return;
      // calc stats
      const allKeys=Object.keys(logs).filter(k=>k.match(/^\d{4}-\d{2}-\d{2}$/));
      const activeDays=allKeys.filter(k=>{
        const snap=logs[k]&&logs[k].__taskIds;
        return snap?snap.includes(tid):(!task.createdAt||task.createdAt<=k)&&(!task.deletedAt||task.deletedAt>k);
      });
      const doneDays=activeDays.filter(k=>logs[k][tid]);
      const rate=activeDays.length?Math.round(doneDays.length/activeDays.length*100):0;
      // streak
      const sorted=[...doneDays].sort();
      let cur=0,best=0,streak=0;
      const today=getTodayKey();
      for(let i=sorted.length-1;i>=0;i--){
        const d=new Date(sorted[i]); const d2=new Date(sorted[i+1]||today);
        const diff=Math.round((d2-d)/(1000*60*60*24));
        if(i===sorted.length-1&&sorted[i]===today) streak=1;
        else if(diff===1) streak++;
        else if(i===sorted.length-1) streak=0;
        best=Math.max(best,streak);
      }
      const popup=document.createElement("div");
      popup.style.cssText="position:fixed;inset:0;z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:24px;pointer-events:none;";
      popup.innerHTML=`<div style="background:var(--bg-card);border:1px solid var(--glass-border);border-radius:16px;padding:18px 22px;max-width:320px;width:100%;pointer-events:auto;box-shadow:0 8px 40px rgba(0,0,0,0.5)">
        <div style="font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px">Quick Stats</div>
        <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:14px">${task.name}</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
          <div style="text-align:center"><div style="font-size:20px;font-weight:700;color:${clr(rate)}">${rate}%</div><div style="font-size:8px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:2px">All time</div></div>
          <div style="text-align:center"><div style="font-size:20px;font-weight:700;color:var(--accent)">${doneDays.length}</div><div style="font-size:8px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:2px">Days done</div></div>
          <div style="text-align:center"><div style="font-size:20px;font-weight:700;color:var(--accent)">${best}</div><div style="font-size:8px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:2px">Best streak</div></div>
        </div>
        <button onclick="this.closest('div[style*=fixed]').remove()" style="width:100%;padding:10px;background:var(--glass);border:1px solid var(--glass-border);color:var(--text2);border-radius:10px;cursor:pointer;font-size:11px;letter-spacing:1px;font-family:inherit">Dismiss</button>
      </div>`;
      document.body.appendChild(popup);
      popup.addEventListener("click",function(ev){ if(ev.target===popup) popup.remove(); });
    },600);
  },{passive:true});
  document.addEventListener("touchend",function(){ if(_lpt){clearTimeout(_lpt);_lpt=null;} },{passive:true});
  document.addEventListener("touchmove",function(){ if(_lpt){clearTimeout(_lpt);_lpt=null;} },{passive:true});
})();

// ── CUSTOM THEME EDITOR ──────────────────────────────────────────────────────
(function(){

  // Show editor after Custom tile click (renderSettings re-creates the DOM, so use setTimeout)
  document.addEventListener('click',function(e){
    const tile=e.target.closest('[data-theme-key]');
    if(tile&&tile.dataset.themeKey==='custom'){
      setTimeout(function(){
        const ed=document.getElementById('custom-theme-editor');
        if(ed){ ed.style.display='block'; updateCtPreview(); updateCtButtonStyle(); }
      },50);
    }
  });

  // Sync color picker ↔ hex text input (delegated — editor is re-rendered each time)
  document.addEventListener('input',function(e){
    const id=e.target.id;
    if(!id||!id.startsWith('ct-')) return;
    if(e.target.type==='color'){
      const hex=document.getElementById(id+'-hex');
      if(hex){ hex.value=e.target.value; }
      updateCtPreview();
    } else if(e.target.type==='text'&&id.endsWith('-hex')){
      const base=id.slice(0,-4);
      const v=e.target.value.trim();
      if(/^#[0-9a-fA-F]{6}$/.test(v)){
        const picker=document.getElementById(base);
        if(picker) picker.value=v;
        updateCtPreview();
      }
    }
  });

  function getCtValues(){
    const g=id=>{ const el=document.getElementById(id+'-hex')||document.getElementById(id); return el?el.value.trim():''; };
    return { bg:g('ct-bg'), card:g('ct-card'), accent:g('ct-accent'), text:g('ct-text'), text2:g('ct-text2'), text3:g('ct-text3') };
  }

  function updateCtPreview(){
    const v=getCtValues();
    const strip=document.getElementById('ct-preview-strip');
    const dot=document.getElementById('ct-prev-dot');
    const bar=document.getElementById('ct-prev-bar');
    const txt=document.getElementById('ct-prev-text');
    if(!strip||!dot||!bar||!txt) return;
    strip.style.background=v.bg||'#111';
    dot.style.background=v.accent||'#888';
    bar.style.background=v.accent||'#888';
    txt.style.color=v.text||'#fff';
    updateCtButtonStyle();
  }

  function updateCtButtonStyle(){
    const v=getCtValues();
    const btn=document.getElementById('ct-apply-btn');
    if(!btn) return;
    btn.style.background=v.accent||'#6366f1';
    // pick contrasting text colour for button
    const r=parseInt((v.accent||'#6366f1').slice(1,3),16);
    const g=parseInt((v.accent||'#6366f1').slice(3,5),16);
    const b=parseInt((v.accent||'#6366f1').slice(5,7),16);
    const lum=(r*299+g*587+b*114)/1000;
    btn.style.color=lum>140?'#000':'#fff';
  }

  // Apply button
  document.addEventListener('click',function(e){
    if(e.target.id!=='ct-apply-btn') return;
    const v=getCtValues();
    if(!v.bg||!v.accent||!v.text){ showImportStatus('Fill all colour fields','#f87171'); return; }
    const built=buildCustomTheme(v.bg, v.accent, v.text, v.text2||v.text, v.text3||v.text);
    // override card bg if user set it explicitly
    if(v.card&&/^#[0-9a-fA-F]{6}$/.test(v.card)){
      built.bgCard=v.card;
      built.bgCell=v.card;
      built.preview[1]=v.card;
    }
    built._text2=v.text2||v.text;
    built._text3=v.text3||v.text;
    THEMES.custom=built;
    try{ localStorage.setItem('rm_custom_theme', JSON.stringify(built)); }catch(err){}
    applyTheme('custom');
    renderSettings();
    showImportStatus('Custom theme applied!', built.accent);
    haptic('success');
  });

  // Reset button
  document.addEventListener('click',function(e){
    if(e.target.id!=='ct-reset-btn') return;
    try{ localStorage.removeItem('rm_custom_theme'); }catch(err){}
    THEMES.custom=buildCustomTheme('#0f1117','#6366f1','#f0f0f4','#e0e0f0','#c0c0d0');
    renderSettings();
    showImportStatus('Custom theme reset','#a0a0c0');
  });

})();

</script>
